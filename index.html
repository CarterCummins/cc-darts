  function computeOverviewStats(hist){
    var totalGames = hist.length;
    var totalBusts = 0;
    var totalMisses = 0;
    var highestThrowEver = 0;
    var highestThrowName = null;
    var perGameHighs = [];
    var dartTotal = 0;
    var dartCount = 0;

    hist.forEach(function(g){
      var gameHighest = 0;
      (g.throws || []).forEach(function(entry){
        (entry.log || []).forEach(function(t){
          if (t.bust) {
            totalBusts += 1;
          } else if (typeof t.score === 'number') {
            if (t.score > highestThrowEver) {
              highestThrowEver = t.score;
              highestThrowName = g.mode === 'ffa' ? entry.who : t.thrower;
            }
            if (t.score > gameHighest) gameHighest = t.score;
          }
          if (t.miss === true) totalMisses += 1;
          if (t.darts && t.darts.length) {
            t.darts.forEach(function(d){
              dartTotal += d;
              dartCount += 1;
              if (d === 0) totalMisses += 1;
            });
          }
        });
      });
      perGameHighs.push(gameHighest);
    });

    var avgBustsPerGame = totalGames ? (totalBusts / totalGames) : 0;
    var avgMissesPerGame = totalGames ? (totalMisses / totalGames) : 0;
    var avgHighestPerGame = perGameHighs.length ? (perGameHighs.reduce(function(a, b){ return a + b; }, 0) / perGameHighs.length) : 0;
    var avgPointsPerDart = dartCount ? (dartTotal / dartCount) : 0;

    return {
      totalGames: totalGames,
      totalBusts: totalBusts,
      avgBustsPerGame: avgBustsPerGame,
      totalMisses: totalMisses,
      avgMissesPerGame: avgMissesPerGame,
      highestThrowEver: highestThrowEver,
      highestThrowName: highestThrowName,
      avgHighestPerGame: avgHighestPerGame,
      avgPointsPerDart: avgPointsPerDart
    };
  }

  function computeIndividualStats(hist){
    var map = {};
    function ensure(name){
      if (!map[name]) map[name] = { name: name, games: 0, wins: 0, busts: 0, misses: 0, highestThrow: 0, perGameHighs: [], dartTotal: 0, dartCount: 0 };
      return map[name];
    }

    hist.forEach(function(g){
      var participantNames = [];
      if (g.mode === 'ffa') {
        participantNames = g.participants.slice();
      } else {
        g.participants.forEach(function(team){ team.forEach(function(n){ participantNames.push(n); }); });
      }

      var winners = g.mode === 'ffa' ? [g.winner] : (g.winnerMembers || []);
      var gameMax = {};
      var gameBusts = {};
      var gameMisses = {};
      var gameDartTotal = {};
      var gameDartCount = {};
      participantNames.forEach(function(n){ gameMax[n] = 0; gameBusts[n] = 0; gameMisses[n] = 0; gameDartTotal[n] = 0; gameDartCount[n] = 0; });

      (g.throws || []).forEach(function(entry){
        (entry.log || []).forEach(function(t){
          var who = g.mode === 'ffa' ? entry.who : t.thrower;
          if (!who) return;
          if (t.bust) {
            gameBusts[who] = (gameBusts[who] || 0) + 1;
          } else if (typeof t.score === 'number') {
            if (t.score > (gameMax[who] || 0)) gameMax[who] = t.score;
          }
          if (t.miss === true) {
            gameMisses[who] = (gameMisses[who] || 0) + 1;
          }
          if (t.darts && t.darts.length) {
            t.darts.forEach(function(d){
              gameDartTotal[who] = (gameDartTotal[who] || 0) + d;
              gameDartCount[who] = (gameDartCount[who] || 0) + 1;
              if (d === 0) gameMisses[who] = (gameMisses[who] || 0) + 1;
            });
          }
        });
      });

      participantNames.forEach(function(name){
        var rec = ensure(name);
        rec.games += 1;
        if (winners.indexOf(name) !== -1) rec.wins += 1;
        rec.busts += gameBusts[name] || 0;
        rec.misses += gameMisses[name] || 0;
        rec.perGameHighs.push(gameMax[name] || 0);
        rec.dartTotal += gameDartTotal[name] || 0;
        rec.dartCount += gameDartCount[name] || 0;
        if ((gameMax[name] || 0) > rec.highestThrow) rec.highestThrow = gameMax[name];
      });
    });

    return Object.keys(map).map(function(k){
      var r = map[k];
      var avgBustsPerGame = r.games ? (r.busts / r.games) : 0;
      var avgMissesPerGame = r.games ? (r.misses / r.games) : 0;
      var avgHighestPerGame = r.perGameHighs.length ? (r.perGameHighs.reduce(function(a, b){ return a + b; }, 0) / r.perGameHighs.length) : 0;
      var avgPointsPerDart = r.dartCount ? (r.dartTotal / r.dartCount) : 0;
      return { name: r.name, games: r.games, wins: r.wins, busts: r.busts, misses: r.misses, avgBustsPerGame: avgBustsPerGame, avgMissesPerGame: avgMissesPerGame, highestThrow: r.highestThrow, avgHighestPerGame: avgHighestPerGame, avgPointsPerDart: avgPointsPerDart };
    }).sort(function(a, b){
      if (b.wins !== a.wins) return b.wins - a.wins;
      return b.games - a.games;
    });
  }

  function computeTeamStats(hist){
    var map = {};
    hist.forEach(function(g){
      if (g.mode !== 'teams') return;
      g.participants.forEach(function(team){
        var key = team.slice().sort().join(' & ');
        if (!map[key]) map[key] = { label: team.join(' & '), games: 0, wins: 0 };
        map[key].games += 1;
        if (g.winner === team.join(' & ')) map[key].wins += 1;
      });
    });
    return Object.keys(map).map(function(k){ return map[k]; }).sort(function(a, b){
      if (b.wins !== a.wins) return b.wins - a.wins;
      return b.games - a.games;
    });
  }

  function recentGamesForPlayer(name, limit){
    var lowerName = name.toLowerCase();
    var hist = loadHistory().slice().reverse().filter(function(g){
      if (isSoloGame(g)) return false;
      if (g.mode === 'ffa') return g.participants.some(function(n){ return n.toLowerCase() === lowerName; });
      return g.participants.some(function(team){ return team.some(function(n){ return n.toLowerCase() === lowerName; }); });
    });
    return hist.slice(0, limit || 5);
  }

  function opponentsLabelForGame(g, lowerName){
    if (g.mode === 'ffa') {
      var others = g.participants.filter(function(n){ return n.toLowerCase() !== lowerName; });
      return others.length ? others.join(', ') : '';
    }
    var ownTeamIdx = g.participants.findIndex(function(team){
      return team.some(function(n){ return n.toLowerCase() === lowerName; });
    });
    if (ownTeamIdx === -1) return '';
    var otherTeam = g.participants[1 - ownTeamIdx];
    return otherTeam ? otherTeam.join(' & ') : '';
  }

          '<div class="hi-winner">' + resultHtml + '</div>' +
          opponentsHtml +
        '</div>';
      }).join('');
    } else {
      gamesHtml = '<p style="font-size:12px; color:var(--text-muted); margin:8px 0 0;">No recent games found.</p>';
    }
    return metricsHtml +

      gamesHtml;

    var app = document.getElementById(containerId || 'app');

      return;
    }
    var overview = computeOverviewStats(hist);
    var indiv = computeIndividualStats(hist);
    var teams = computeTeamStats(hist);

    var highestCardBody = '<p class="m-value">' + overview.highestThrowEver + '</p>';
    if (overview.highestThrowName) {

        '<div class="metric-card"><p class="m-label">Games played</p><p class="m-value">' + overview.totalGames + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Total busts</p><p class="m-value">' + overview.totalBusts + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Avg busts / game</p><p class="m-value">' + overview.avgBustsPerGame.toFixed(1) + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Avg misses / game</p><p class="m-value">' + overview.avgMissesPerGame.toFixed(1) + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Highest throw</p>' + highestCardBody + '</div>' +
        '<div class="metric-card"><p class="m-label">Avg highest / game</p><p class="m-value">' + overview.avgHighestPerGame.toFixed(1) + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Avg pts / dart</p><p class="m-value">' + overview.avgPointsPerDart.toFixed(1) + '</p></div>' +

    }
    function rankMedal(i){
      if (i === 0) return crownIcon('#f0c94f');
      if (i === 1) return crownIcon('#c0c0c0');
      if (i === 2) return crownIcon('#c67f3b');
      return '';
    }

    var indivCardsHtml = indiv.map(function(p, i){

      return '<div class="stat-card">' +
        '<button type="button" class="stat-row" data-idx="' + i + '">' +
          '<span class="stat-rank">' + rankMedal(i) + (i + 1) + '</span>' +

          '<span class="stat-chevron" id="stat-chev-' + i + '">&#9662;</span>' +
        '</button>' +
        '<div class="stat-detail" id="stat-detail-' + i + '" style="display:none;">' +

      '</div>';

    var html =
      overviewHtml +
      '<p class="section-heading">Individual leaderboard</p>' +

        '<tbody>' + teamRows + '</tbody></table></div>';

    app.innerHTML = html;

    document.querySelectorAll('.stat-row').forEach(function(b){
      b.addEventListener('click', function(){
        var idx = b.dataset.idx;
        var detail = document.getElementById('stat-detail-' + idx);

      });

    if (!panel) return;
    var visible = CHANGELOG.slice(0, changelogVisibleCount);
    var rowsHtml = visible.map(function(c){
      return '<div class="cl-row"><span class="cl-v">v' + c.v + '</span><span class="cl-notes">' + c.notes + '</span></div>';
    }).join('');
    var moreHtml = (changelogVisibleCount < CHANGELOG.length)
      ? '<button type="button" id="changelog-load-more-btn" style="width:100%; margin-top:8px;">Load 5 more (' + (CHANGELOG.length - changelogVisibleCount) + ' left)</button>'
      : '';
    panel.innerHTML = rowsHtml + moreHtml;
    var moreBtn = document.getElementById('changelog-load-more-btn');
    if (moreBtn) moreBtn.addEventListener('click', function(){
      changelogVisibleCount += 5;
      renderChangelogList();
    });
  }

  function initFooter(){
    var versionLabel = document.getElementById('version-label');
    if (versionLabel) versionLabel.textContent = 'v' + APP_VERSION;
    renderChangelogList();
    var panel = document.getElementById('changelog-panel');
    var toggle = document.getElementById('changelog-toggle');
    if (toggle) {
      toggle.addEventListener('click', function(){
        if (panel.style.display === 'none') {
          panel.style.display = 'block';
          toggle.textContent = 'Hide changelog';
        } else {
          panel.style.display = 'none';
          toggle.textContent = 'Changelog';
        }
      });
    }
  }

  refreshRosterDatalist();
  initFooter();
  initTheme();
  initSettingsButton();
  initPlayersPanel();
  initHistoryStatsButtons();
  initGlobalMenuButton();
  initClickSounds();
  initAudioUnlock();
  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
