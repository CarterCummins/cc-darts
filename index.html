<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CK Darts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14151a;
    --card: #1e2028;
    --card-active: #23283a;
    --border: #2c2f3a;
    --border-accent: #5b8cff;
    --text: #eef0f5;
    --text-secondary: #9aa0b0;
    --text-muted: #6b7180;
    --danger: #e05a5a;
    --success: #4fce8a;
    --teamA: #5b8cff;
    --teamB: #e08a4f;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 70px 16px 64px;
  }
  #app-wrap { width: 100%; max-width: 680px; position: relative; z-index: 1; }
  #app { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.45); }
  h1 {
    font-family: 'Bungee', 'Poppins', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 1px;
    text-align: center;
    margin: 0 0 4px;
    background: linear-gradient(90deg, #ff4fd8, #4feaff, #7c4fff, #ffe75b, #ff4fd8);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: logoShift 10s ease-in-out infinite;
  }
  @keyframes logoShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @media (prefers-reduced-motion: reduce) {
    h1 { animation: none; }
  }
  .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin: 0 0 20px; }
  p.label { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px; }
  input, select, button { font-family: inherit; font-size: 15px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); color: var(--text); padding: 10px 12px; }
  input:focus, select:focus, button:focus { outline: none; border-color: var(--border-accent); }
  input[type="text"], input[type="number"] { width: 100%; }
  button { cursor: pointer; font-weight: 500; transition: transform 0.05s ease; }
  button:hover { border-color: var(--border-accent); }
  button:active { transform: scale(0.98); }
  .btn-primary { border: 2px solid var(--border-accent); color: var(--border-accent); background: var(--card); }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .mode-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-row button { flex: 1; }
  .mode-row button.active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  #first-row button { flex: 0 1 auto; }
  .count-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .count-row button { min-width: 44px; }
  .count-row button.active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  #name-list input, .team-block input { margin-bottom: 8px; }
  .team-block { background: var(--card); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
  .team-block .team-label { font-size: 13px; font-weight: 500; margin: 0 0 8px; }
  .team-block.a .team-label { color: var(--teamA); }
  .team-block.b .team-label { color: var(--teamB); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .player-card { background: var(--card); border-radius: var(--radius); padding: 16px; text-align: center; border: 1px solid var(--border); }
  .player-card.active { background: var(--card-active); border: 2px solid var(--border-accent); }
  .player-card .pname { font-size: 13px; color: var(--text-secondary); margin: 0 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-card.active .pname { color: var(--text); font-weight: 500; }
  .player-card .pscore { font-size: 32px; font-weight: 600; margin: 0; }
  .turn-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .turn-row p { margin: 0; font-size: 15px; flex: 1; }
  .entry-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .entry-row input { flex: 1; }
  .entry-row button { min-width: 90px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-muted); font-weight: 400; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th:last-child, td:last-child { text-align: right; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
  td:last-child { color: var(--text); }
  td.bust { color: var(--danger); }
  .reset-btn { width: 100%; margin-top: 20px; }
  .finish-wrap { text-align: center; padding: 40px 0; }
  .trophy { font-size: 48px; margin-bottom: 12px; }
  .winner-name { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .winner-sub { font-size: 14px; color: var(--text-secondary); margin: 0 0 24px; }
  .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 0; }
  .history-item { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .history-item .hi-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .history-item .hi-date { font-size: 12px; color: var(--text-muted); }
  .history-item .hi-mode { font-size: 11px; color: var(--text-secondary); background: var(--card-active); padding: 2px 8px; border-radius: 20px; }
  .history-item .hi-winner { font-size: 14px; }
  .history-item .hi-winner b { color: var(--success); }
  .history-item .hi-participants { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .section-heading { font-size: 15px; font-weight: 500; margin: 24px 0 10px; }
  .section-heading:first-child { margin-top: 0; }
  .stats-table { margin-bottom: 8px; }
  .clear-btn { width: 100%; margin-top: 28px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 8px; }
  .metric-card { background: var(--card); border-radius: var(--radius); padding: 12px 14px; }
  .metric-card .m-label { font-size: 12px; color: var(--text-secondary); margin: 0 0 4px; }
  .metric-card .m-value { font-size: 22px; font-weight: 600; margin: 0; }
  .metric-card .m-crown { font-size: 18px; margin: 0 0 2px; line-height: 1; }
  .metric-card .m-name { font-size: 12px; color: var(--text-secondary); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .table-scroll { overflow-x: auto; margin-bottom: 8px; }
  .table-scroll table { min-width: 480px; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip { padding: 7px 14px; border-radius: 20px; font-size: 13px; }
  .chip.used { border-color: var(--border-accent); color: var(--border-accent); background: var(--card-active); }
  .chip-check { font-style: normal; }
  .chip-wrap { display: inline-flex; align-items: center; gap: 4px; }
  .chip-settings { padding: 6px 8px; border-radius: 20px; font-size: 12px; color: var(--text-muted); line-height: 1; }
  .chip-settings:hover { color: var(--text); }
  .edit-panel { background: var(--card); border-radius: var(--radius); padding: 14px; margin-top: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
  .linked-input-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .linked-input-row input { flex: 1; }
  .search-spotify-btn { flex: 0 0 auto; padding: 8px 10px; font-size: 14px; }
  .avatar-preview { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--card-active); display: block; }
  .avatar-placeholder { display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; color: var(--text-secondary); }
  .photo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .photo-row-actions { display: flex; flex-direction: column; gap: 6px; }
  .photo-row-actions button { font-size: 12px; padding: 7px 12px; }
  .turn-row .avatar-preview, .turn-row .avatar-placeholder { width: 32px; height: 32px; font-size: 14px; flex-shrink: 0; }
  .player-row-avatar { width: 36px; height: 36px; font-size: 15px; flex-shrink: 0; }
  .app-footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--text-muted); }
  .app-footer button { background: none; border: none; padding: 0; font-size: 12px; color: var(--text-muted); text-decoration: underline; cursor: pointer; }
  .changelog-panel { text-align: left; margin-top: 12px; background: var(--card); border-radius: var(--radius); padding: 12px 14px; }
  .changelog-panel .cl-row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .changelog-panel .cl-row:last-child { border-bottom: none; }
  .changelog-panel .cl-v { color: var(--text); font-weight: 500; white-space: nowrap; }
  .changelog-panel .cl-notes { color: var(--text-secondary); }
  .snippet-box { background: var(--card); border: 1px solid var(--border-accent); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; }
  .embed-fallback { margin-top: 8px; }
  .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .game-card { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 14px; text-align: left; border-radius: 12px; }
  .game-card-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .game-card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .trippy-fullscreen { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #08080c; animation: trippyHue 9s linear infinite; pointer-events: none; }
  .blob { position: absolute; width: 46vmin; height: 46vmin; border-radius: 50%; filter: blur(60px); opacity: 0.85; mix-blend-mode: screen; }
  .blob.b1 { background: #ff4fd8; top: -8%; left: -8%; animation: blobFloat1 15s ease-in-out infinite; }
  .blob.b2 { background: #4feaff; top: -6%; right: -10%; animation: blobFloat2 19s ease-in-out infinite; }
  .blob.b3 { background: #fff24f; bottom: -12%; left: 12%; animation: blobFloat3 17s ease-in-out infinite; }
  .blob.b4 { background: #7c4fff; bottom: -14%; right: 6%; animation: blobFloat4 21s ease-in-out infinite; }
  .blob.b5 { background: #4fff8f; top: 34%; left: 34%; animation: blobFloat5 13s ease-in-out infinite; }
  .choose-game-panel { position: relative; z-index: 1; }
  @keyframes trippyHue { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  @keyframes blobFloat1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40vw, 40vh) scale(1.35); } }
  @keyframes blobFloat2 { 0%, 100% { transform: translate(0, 0) scale(1.1); } 50% { transform: translate(-40vw, 35vh) scale(0.85); } }
  @keyframes blobFloat3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30vw, -35vh) scale(1.25); } }
  @keyframes blobFloat4 { 0%, 100% { transform: translate(0, 0) scale(1.15); } 50% { transform: translate(-30vw, -30vh) scale(0.9); } }
  @keyframes blobFloat5 { 0%, 100% { transform: translate(-15vw, -10vh) scale(0.9); } 50% { transform: translate(20vw, 25vh) scale(1.3); } }
  @media (prefers-reduced-motion: reduce) {
    .trippy-fullscreen, .blob { animation: none !important; }
  }
  .cricket-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 320px; }
  .cricket-table th, .cricket-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: center; }
  .cricket-table th:first-child, .cricket-table td.cricket-label { text-align: left; color: var(--text-secondary); }
  .cricket-mark { letter-spacing: 2px; }
  .cricket-target-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin-top: 12px; }
  .cricket-target.dead { color: var(--text-muted); border-color: var(--border); }
  .settings-fab { position: fixed; top: 14px; left: 14px; z-index: 50; width: 38px; height: 38px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .menu-fab { position: fixed; top: 14px; left: 60px; z-index: 50; display: flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 22px; font-size: 14px; font-weight: 500; }
  .top-right-controls { position: fixed; top: 14px; right: 14px; z-index: 50; display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; max-width: calc(100vw - 28px); }
  .players-fab { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 22px; font-size: 14px; font-weight: 500; }
  .overlay-panel { position: fixed; top: 60px; right: 14px; z-index: 50; width: min(92vw, 460px); max-height: 78vh; overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .settings-panel { position: fixed; top: 60px; left: 14px; z-index: 50; width: 220px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .settings-panel label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .settings-panel input[type="color"] { width: 100%; height: 36px; padding: 2px; margin-top: 4px; cursor: pointer; }
  .players-panel { position: fixed; top: 60px; right: 14px; z-index: 50; width: min(92vw, 300px); max-height: 78vh; overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .player-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .player-row:last-child { border-bottom: none; }
  .player-row-info { flex: 1; min-width: 0; }
  .player-row-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-row-stats { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .player-row-edit { font-size: 12px; padding: 6px 10px; flex-shrink: 0; }
  .theme-swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
  .theme-swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 2px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; }
  .theme-swatch:hover { border-color: var(--border-strong); }
  .theme-swatch .swatch-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); }
  .theme-swatch .swatch-label { font-size: 10px; color: var(--text-muted); }
  .sound-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .sound-btn { font-size: 12px; padding: 6px 10px; }
  .sound-btn.active { border: 2px solid var(--border-accent); color: var(--border-accent); }
</style>
</head>
<body>
<div id="trippy-bg" class="trippy-fullscreen" style="display:block;">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
</div>
<button type="button" id="settings-btn" class="settings-fab" aria-label="Settings">&#9881;</button>
<div class="top-right-controls">
  <button type="button" id="history-btn" class="players-fab" aria-label="History">&#128220; History</button>
  <button type="button" id="stats-btn" class="players-fab" aria-label="Stats">&#128202; Stats</button>
  <button type="button" id="players-btn" class="players-fab" aria-label="Players">&#128101; Players</button>
</div>
<button type="button" id="global-menu-btn" class="menu-fab" aria-label="Main menu">&#8962; Main menu</button>
<div id="history-panel" class="overlay-panel" style="display:none;"></div>
<div id="stats-panel" class="overlay-panel" style="display:none;"></div>
<div id="players-panel" class="players-panel" style="display:none;"></div>
<div id="settings-panel" class="settings-panel" style="display:none;">
  <p class="label" style="margin-top:0;">Presets</p>
  <div class="theme-swatch-grid" id="theme-swatch-grid"></div>
  <p class="label">Custom</p>
  <label>Background
    <input type="color" id="theme-bg" />
  </label>
  <label>Trim &middot; cards and borders
    <input type="color" id="theme-card" />
  </label>
  <label>Accent color
    <input type="color" id="theme-accent" />
  </label>
  <div style="display:flex; gap:8px; margin-top:10px;">
    <button type="button" id="theme-reset" style="flex:1;">Reset</button>
    <button type="button" id="theme-close" class="btn-primary" style="flex:1;">Done</button>
  </div>
  <p class="label" style="margin-top:16px;">Click sounds</p>
  <div class="sound-row" id="sound-row"></div>
  <p class="label" style="margin-top:16px;">Backup &amp; restore</p>
  <p style="font-size:11px; color:var(--text-muted); margin:0 0 8px;">Export before downloading a new version of this file, then import it back &mdash; browsers don't share saved data between file downloads.</p>
  <div style="display:flex; gap:8px;">
    <button type="button" id="export-data-btn" style="flex:1;">Export</button>
    <button type="button" id="import-data-btn" style="flex:1;">Import</button>
  </div>
  <input type="file" id="import-file-input" accept="application/json" style="display:none;" />
</div>
<div id="app-wrap">
  <h1>CK Darts</h1>
  <p class="subtitle">Free-for-all or 2v2 teams, with saved players and stats</p>
  <div id="snippet-zone"></div>
  <div id="app"></div>
  <datalist id="roster-list"></datalist>
  <div class="app-footer">
    <span id="version-label"></span> &middot; <button type="button" id="changelog-toggle">Changelog</button>
    <div id="changelog-panel" class="changelog-panel" style="display:none;"></div>
  </div>
</div>

<script>
(function(){
  var ROSTER_KEY = 'darts_roster_v1';
  var HISTORY_KEY = 'darts_history_v1';
  var PROFILES_KEY = 'darts_profiles_v1';
  var THEME_KEY = 'darts_theme_v1';
  var DEFAULT_THEME = { bg: '#14151a', card: '#1e2028', accent: '#5b8cff' };
  var PRESET_THEMES = [
    { name: 'Midnight', bg: '#14151a', card: '#1e2028', accent: '#5b8cff' },
    { name: 'Forest', bg: '#0f1a14', card: '#16261d', accent: '#4fce8a' },
    { name: 'Sunset', bg: '#1a1210', card: '#261a16', accent: '#e08a4f' },
    { name: 'Crimson', bg: '#1a1113', card: '#261619', accent: '#e05a5a' },
    { name: 'Royal', bg: '#141220', card: '#1e1a30', accent: '#a06be0' },
    { name: 'Gold', bg: '#1a1608', card: '#26210f', accent: '#f0c94f' },
    { name: 'Ocean', bg: '#0d1620', card: '#132230', accent: '#4fc3e0' },
    { name: 'Mono', bg: '#121212', card: '#1c1c1c', accent: '#d0d0d0' }
  ];

  var SOUND_KEY = 'darts_sound_v1';
  var SOUND_OPTIONS = ['none', 'ping', 'doing', 'splat', 'mush', 'acid'];
  var audioCtx = null;

  function loadSoundSetting(){
    try { return localStorage.getItem(SOUND_KEY) || 'none'; } catch(e){ return 'none'; }
  }
  function saveSoundSetting(v){
    try { localStorage.setItem(SOUND_KEY, v); } catch(e){}
  }

  function getAudioCtx(){
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch(e){}
    }
    return audioCtx;
  }
  function makeNoiseBuffer(ctx, duration){
    var size = Math.floor(ctx.sampleRate * duration);
    var buffer = ctx.createBuffer(1, size, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    return buffer;
  }
  function playPing(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(950, t + 0.12);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.22);
  }
  function playDoing(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.linearRampToValueAtTime(640, t + 0.08);
    osc.frequency.linearRampToValueAtTime(180, t + 0.24);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.3);
  }
  function playSplat(ctx){
    var t = ctx.currentTime;
    var noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, 0.22);
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3200, t);
    filter.frequency.exponentialRampToValueAtTime(180, t + 0.18);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    noise.connect(filter).connect(gain).connect(ctx.destination);
    noise.start(t);
    noise.stop(t + 0.22);
  }
  function playMush(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(65, t + 0.3);
    var oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.3, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.34);
    var noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, 0.3);
    var noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 350;
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.14, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(oscGain).connect(ctx.destination);
    noise.connect(noiseFilter).connect(noiseGain).connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.34);
    noise.start(t); noise.stop(t + 0.3);
  }
  function playAcid(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, t);
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 16;
    filter.frequency.setValueAtTime(2400, t);
    filter.frequency.exponentialRampToValueAtTime(220, t + 0.26);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.22, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(filter).connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.3);
  }
  function playClickSound(type){
    var kind = type || loadSoundSetting();
    if (kind === 'none') return;
    var ctx = getAudioCtx();
    if (!ctx) return;
    function fire(){
      if (kind === 'ping') playPing(ctx);
      else if (kind === 'doing') playDoing(ctx);
      else if (kind === 'splat') playSplat(ctx);
      else if (kind === 'mush') playMush(ctx);
      else if (kind === 'acid') playAcid(ctx);
    }
    if (ctx.state === 'suspended' && ctx.resume) {
      ctx.resume().then(fire).catch(fire);
    } else {
      fire();
    }
  }

    });
  }

  function loadTheme(){
    try {
      var saved = JSON.parse(localStorage.getItem(THEME_KEY)) || {};
      return { bg: saved.bg || DEFAULT_THEME.bg, card: saved.card || DEFAULT_THEME.card, accent: saved.accent || DEFAULT_THEME.accent };
    } catch(e){
      return { bg: DEFAULT_THEME.bg, card: DEFAULT_THEME.card, accent: DEFAULT_THEME.accent };
    }
  }
  function saveTheme(t){
    try { localStorage.setItem(THEME_KEY, JSON.stringify(t)); } catch(e){}
  }
  function applyTheme(t){
    document.documentElement.style.setProperty('--bg', t.bg);
    document.documentElement.style.setProperty('--card', t.card);
    document.documentElement.style.setProperty('--border-accent', t.accent);
  }

    var cardInput = document.getElementById('theme-card');
    var accentInput = document.getElementById('theme-accent');
    bgInput.value = theme.bg;
    cardInput.value = theme.card;

    var swatchGrid = document.getElementById('theme-swatch-grid');

    swatchGrid.querySelectorAll('.theme-swatch').forEach(function(b){

    btn.addEventListener('click', function(){

    bgInput.addEventListener('input', updateTheme);
    cardInput.addEventListener('input', updateTheme);

      bgInput.value = DEFAULT_THEME.bg;

  function renameRosterPlayer(oldName, newName){
    newName = (newName || '').trim();

    var lowerOld = oldName.toLowerCase();

    var roster = loadRoster();
    var idx = roster.findIndex(function(r){ return r.toLowerCase() === lowerOld; });
    if (idx !== -1) roster[idx] = newName;
    saveRoster(roster);

    var hist = loadHistory();
    hist.forEach(function(g){
      if (g.mode === 'ffa') {
        g.participants = g.participants.map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; });
        if (g.winner && g.winner.toLowerCase() === lowerOld) g.winner = newName;
      } else {
        g.participants = g.participants.map(function(team){
          return team.map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; });
        });
        if (g.winnerMembers) {
          g.winnerMembers = g.winnerMembers.map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; });
          g.winner = g.winnerMembers.join(' & ');
        }
      }
      (g.throws || []).forEach(function(entry){
        if (g.mode === 'ffa' && entry.who && entry.who.toLowerCase() === lowerOld) {
          entry.who = newName;
        } else if (g.mode === 'teams' && entry.who) {
          entry.who = entry.who.split(' & ').map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; }).join(' & ');
        }
        (entry.log || []).forEach(function(t){
          if (t.thrower && t.thrower.toLowerCase() === lowerOld) t.thrower = newName;
        });
      });
    });
    saveHistory(hist);

    var profiles = loadProfiles();
    if (profiles[lowerOld]) {
      profiles[newName.toLowerCase()] = profiles[lowerOld];
      delete profiles[lowerOld];
      saveProfiles(profiles);
    }

    state.names = state.names.map(function(n){ return (n || '').toLowerCase() === lowerOld ? newName : n; });

  function resizeImageToDataUrl(file, maxDim, callback){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        var scale = Math.min(1, maxDim / Math.max(w, h));
        var cw = Math.max(1, Math.round(w * scale));
        var ch = Math.max(1, Math.round(h * scale));
        var canvas = document.createElement('canvas');
        canvas.width = cw;
        canvas.height = ch;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, cw, ch);
        try {
          callback(canvas.toDataURL('image/jpeg', 0.82));
        } catch(err){
          callback(null);
        }
      };
      img.onerror = function(){ callback(null); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ callback(null); };
    reader.readAsDataURL(file);
  }

  function playAudioPreview(containerId, spotifyUri, durationMs){
    var target = document.getElementById(containerId);
    if (!target) return;
    stopAudio(containerId);
    target.innerHTML = '<p class="label" style="margin:0;">Loading song&hellip;</p>';

    fetchPreview(spotifyUri).then(function(data){
      var current = document.getElementById(containerId);
      if (!current) return;
      if (!data || !data.previewUrl) {
        current.innerHTML =
          '<button type="button" class="chip embed-fallback" id="' + containerId + '-open">&#127925; ' +
          (data && data.name ? data.name : 'Open in Spotify') + '</button>';
        var openBtn = document.getElementById(containerId + '-open');
        if (openBtn) openBtn.addEventListener('click', function(){ openSpotifyUri(spotifyUri); });
        return;
      }
      var audio = new Audio(data.previewUrl);
      audio.volume = 1;
      window.__ckdAudio[containerId] = audio;
      current.innerHTML = '<p class="label" style="margin:0;">' + (data.name || 'Now playing') + '</p>';
      var playAttempt = audio.play();
      if (playAttempt && playAttempt.catch) {
        playAttempt.catch(function(){
          current.innerHTML =
            '<button type="button" class="chip embed-fallback" id="' + containerId + '-fallback">&#9654; Play ' +
            (data.name || '') + '</button>';
          var fb = document.getElementById(containerId + '-fallback');
          if (fb) fb.addEventListener('click', function(){ audio.play(); });
        });
      }
      if (durationMs) {
        setTimeout(function(){ stopAudio(containerId); }, durationMs);
      }
      audio.addEventListener('ended', function(){
        if (window.__ckdAudio[containerId] === audio) window.__ckdAudio[containerId] = null;
      });
    });
  }

    var value = CRICKET_VALUES[key];
    var current = entity.marks[key];
    var thrower = state.mode === 'ffa' ? entity.name : entity.members[state.turnMember[state.turnIndex]];
    var scored = false;
    if (current >= 3) {
      var openElsewhere = others.some(function(o){ return o.marks[key] < 3; });
      if (openElsewhere) {
        entity.points += value;
        scored = true;
      }
    }
    entity.marks[key] = current + 1;
    entity.history.push({ key: key, scored: scored, thrower: thrower });
    state.cricketDartsThisTurn += 1;

    if (cricketAllClosed(entity)) {
      var maxOther = others.reduce(function(m, o){ return Math.max(m, o.points); }, 0);
      if (entity.points >= maxOther) {
        declareWin(entity);
        return;

      maybePlaySnippet(p.name, val, remaining);
      if (remaining === 0) {
        declareWin(p);
        return;
      }
    } else {
      p.history.push({ score: val, remaining: p.score, bust: true });
    }
    state.turnIndex = (state.turnIndex + 1) % state.players.length;
    render();
  }

  function submitScoreTeams(){
    var input = document.getElementById('turn-score');
    var val = parseInt(input.value, 10);
    if (isNaN(val) || val < 0) val = 0;
    if (val > 180) val = 180;
    var t = state.teams[state.turnIndex];
    var remaining = t.score - val;
    var bust = remaining < 0;
    var thrower = t.members[state.turnMember[state.turnIndex]];
    if (!bust) {
      t.score = remaining;
      t.history.push({ score: val, remaining: remaining, bust: false, thrower: thrower });
      maybePlaySnippet(thrower, val, remaining);
      if (remaining === 0) {
        declareWin(t);
        return;
      }
    } else {
      t.history.push({ score: val, remaining: t.score, bust: true, thrower: thrower });
    }
    state.turnMember[state.turnIndex] = (state.turnMember[state.turnIndex] + 1) % 2;
    state.turnIndex = (state.turnIndex + 1) % state.teams.length;
    render();
  }

  function submitScore(){
    var type = currentGameType();
    if (type === 'atc') { submitAtcHits(); return; }
    if (type === 'cricket') return;
    if (state.mode === 'ffa') submitScoreFFA();

      var closedForActive = entity.marks[k] >= 3;
      var closedForAll = entities.every(function(e){ return e.marks[k] >= 3; });
      var label = (k === 'B' ? 'Bull' : k) + (closedForActive ? ' &#10003;' : '');
      return '<button type="button" class="cricket-target ' + (closedForAll ? 'dead' : '') + '" data-key="' + k + '">' + label + '</button>';
    }).join('');

    app.innerHTML =
      '<div class="table-scroll"><table class="cricket-table"><thead><tr><th></th>' + headerCells + '</tr></thead>' +
      '<tbody>' + numberRows + pointsRow + '</tbody></table></div>' +
      '<div class="turn-row">' + avatarHtml(getProfile(thrower).photo, thrower) + '<p>' + thrower + '&rsquo;s turn &middot; dart ' + (state.cricketDartsThisTurn + 1) + ' of 3</p></div>' +
      '<div class="cricket-target-grid" id="cricket-target-grid">' + targetButtons + '</div>' +
      '<button id="end-turn-btn" style="width:100%; margin-top:12px;">End turn</button>' +
      '<button class="reset-btn" id="reset-btn">Reset game</button>';

    document.querySelectorAll('.cricket-target').forEach(function(b){
      b.addEventListener('click', function(){ hitCricketNumber(b.dataset.key); });
    });
    document.getElementById('end-turn-btn').addEventListener('click', endCricketTurn);
    document.getElementById('reset-btn').addEventListener('click', resetGame);
  }

  function launchFireworks(canvas){
    var ctx = canvas.getContext('2d');
    var w = canvas.width = canvas.clientWidth;
    var h = canvas.height = canvas.clientHeight;
    var colors = ['#5b8cff', '#e08a4f', '#4fce8a', '#e05a5a', '#f0c94f', '#c56be0'];
    var particles = [];

    function spawnBurst(){
      var cx = w * (0.2 + Math.random() * 0.6);
      var cy = h * (0.15 + Math.random() * 0.4);
      var color = colors[Math.floor(Math.random() * colors.length)];
      var count = 26;
      for (var i = 0; i < count; i++) {
        var angle = (Math.PI * 2 * i) / count;
        var speed = 1.6 + Math.random() * 2.2;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          color: color
        });
      }
    }

    var bursts = 0;
    var maxBursts = 5;
    spawnBurst();
    bursts++;
    var burstTimer = setInterval(function(){
      spawnBurst();
      bursts++;
      if (bursts >= maxBursts) clearInterval(burstTimer);
    }, 450);

    var stopped = false;
    function tick(){
      if (stopped) return;
      ctx.clearRect(0, 0, w, h);
      particles.forEach(function(p){
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.035;
        p.alpha -= 0.012;
      });
      particles = particles.filter(function(p){ return p.alpha > 0; });
      particles.forEach(function(p){
        ctx.globalAlpha = Math.max(p.alpha, 0);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      if (bursts < maxBursts || particles.length > 0) {
        requestAnimationFrame(tick);
      } else {
        ctx.clearRect(0, 0, w, h);
      }
    }
    tick();
  }

  function showSnippet(name, uri){
    var zone = document.getElementById('snippet-zone');
    if (!zone) return;
    zone.innerHTML =
      '<div class="snippet-box">' +
        '<p class="label" style="margin:0 0 6px;">' + name + '&rsquo;s 50+ snippet</p>' +
        '<div id="snippet-embed"></div>' +
      '</div>';
    playSpotifySong('snippet-embed', { uri: uri, name: null }, 10000);
    clearTimeout(window.__snippetClearTimer);
    window.__snippetClearTimer = setTimeout(function(){
      var z = document.getElementById('snippet-zone');
      if (z) z.innerHTML = '';
    }, 10600);
  }

  function maybePlaySnippet(name, val, remaining){
    if (state.game !== '200') return;
    if (val <= 50 || remaining === 0) return;
    var profile = getProfile(name);
    if (!profileHasAudio(profile)) return;
    var uri = pickProfileEmbedUri(profile);
    if (!uri) return;
    showSnippet(name, uri);
  }

  function pickWinnerSong(candidates){
    var withAudio = candidates.filter(function(n){
      return profileHasAudio(getProfile(n));
    });
    if (withAudio.length === 0) return null;
    var chosenName = withAudio[Math.floor(Math.random() * withAudio.length)];
    var profile = getProfile(chosenName);
    var uri = pickProfileEmbedUri(profile);
    if (!uri) return null;
    return { name: chosenName, artist: profile.artist, uri: uri };
  }

  function renderFinished(){
    var app = document.getElementById('app');
    var label = state.mode === 'ffa' ? state.winner : state.winnerLabel;
    var song = state.winnerSong;
    var game = currentGame();
    var subLabel;
    if (game.type === 'countdown') subLabel = 'Checked out from ' + game.startScore;
    else if (game.type === 'atc') subLabel = 'Finished around the clock';
    else subLabel = 'Closed out the board';
    var songHtml = '';
    if (song) {
      songHtml =
        '<p class="label" style="text-align:center; margin-top:16px;">' + song.name + '&rsquo;s song' + (song.artist ? ' &middot; ' + song.artist : '') + '</p>' +
        '<div id="win-song-embed"></div>';
    }
    app.innerHTML =
      '<div class="finish-wrap" style="position:relative;">' +
        '<canvas id="fireworks-canvas" style="position:absolute; inset:0; width:100%; height:100%;"></canvas>' +
        '<div style="position:relative; z-index:1;">' +
          '<div class="trophy">🏆</div>' +
          '<p class="winner-name">' + label + ' wins</p>' +
          '<p class="winner-sub">' + subLabel + '</p>' +
          songHtml +
          '<div style="display:flex; gap:8px; margin-top:20px;">' +
            '<button class="btn-primary reset-btn" id="play-again-btn" style="flex:1; margin-top:0;">Play again</button>' +
            '<button class="reset-btn" id="main-menu-btn" style="flex:1; margin-top:0;">Main menu</button>' +
            '<button class="reset-btn" id="players-btn-finish" style="flex:1; margin-top:0;">Players</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('play-again-btn').addEventListener('click', playAgain);
    document.getElementById('main-menu-btn').addEventListener('click', backToChooseGame);
    document.getElementById('players-btn-finish').addEventListener('click', togglePlayersPanel);
    if (song) {
      playSpotifySong('win-song-embed', song, 60000);
    }
    var fwCanvas = document.getElementById('fireworks-canvas');

  function renderPlayTab(){
    if (state.stage === 'chooseGame') renderChooseGame();
    else if (state.stage === 'setup') renderPlaySetup();
    else if (state.stage === 'playing') renderPlaying();
    else renderFinished();
  }

  function formatDate(iso){
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' +
      d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  }

  function managePlayersHtml(){
    var roster = loadRoster();
    if (!roster.length) return '';
    var chips = roster.map(function(n){
      var safe = n.replace(/"/g, '&quot;');
      return '<div class="chip-wrap">' +
        '<span class="chip" style="cursor:default;">' + n + '</span>' +
        '<button type="button" class="chip-settings purge-player-btn" data-name="' + safe + '" aria-label="Clear stats for ' + safe + '">&#10005;</button>' +
      '</div>';
    }).join('');
    return '<p class="section-heading" style="margin-top:0;">Clear player stats</p><div class="chip-row">' + chips + '</div>';
  }

  function wireManagePlayers(){
    document.querySelectorAll('.purge-player-btn').forEach(function(b){
      b.addEventListener('click', function(){
        var name = b.dataset.name;
        if (window.confirm('Clear all games and stats for ' + name + '? They\u2019ll stay in your saved players list \u2014 this only removes their games from history, which also removes those games from any other players\u2019 stats. This cannot be undone.')) {
          clearPlayerFromHistory(name);
          render();
        }
      });
    });
  }

  function renderHistoryTab(containerId){
    var app = document.getElementById(containerId || 'app');
    var hist = loadHistory().slice().reverse();
    var manageHtml = managePlayersHtml();
    if (hist.length === 0) {
      app.innerHTML = manageHtml + '<div class="empty-state">No games played yet. Finish a game to see it here.</div>';
      wireManagePlayers();
      return;
    }
    var items = hist.map(function(g){
      var participantsLabel;
      if (g.mode === 'ffa') {
        participantsLabel = g.participants.join(', ');
      } else {
        participantsLabel = g.participants.map(function(team){ return team.join(' & '); }).join('  vs  ');
      }
      var gameLabel = g.gameLabel || (g.startScore ? ('Countdown from ' + g.startScore) : 'Game');
      var modeLabel = g.mode === 'ffa' ? 'Free for all' : '2v2 teams';
      return '<div class="history-item">' +
        '<div class="hi-top">' +
          '<span class="hi-date">' + formatDate(g.date) + '</span>' +
          '<span style="display:flex; align-items:center; gap:6px;">' +
            '<span class="hi-mode">' + gameLabel + ' &middot; ' + modeLabel + '</span>' +
            '<button type="button" class="chip-settings delete-game-btn" data-id="' + g.id + '" aria-label="Delete this game">&#10005;</button>' +
          '</span>' +
        '</div>' +
        '<div class="hi-winner">Winner: <b>' + g.winner + '</b></div>' +
        '<div class="hi-participants">' + participantsLabel + '</div>' +
      '</div>';
    }).join('');
    app.innerHTML = manageHtml + items + '<button class="btn-danger clear-btn" id="clear-history-btn">Clear history</button>';
    wireManagePlayers();
    document.querySelectorAll('.delete-game-btn').forEach(function(b){
      b.addEventListener('click', function(){
        if (window.confirm('Delete this game from history? This cannot be undone.')) {
          var id = parseInt(b.dataset.id, 10);
          var h = loadHistory().filter(function(g){ return g.id !== id; });
          saveHistory(h);
          render();
        }
      });
    });
    document.getElementById('clear-history-btn').addEventListener('click', function(){
      if (window.confirm('Clear all game history? This cannot be undone.')) {
        saveHistory([]);
        render();
      }
    });
  }

  function computeOverviewStats(hist){
    var totalGames = hist.length;
    var totalBusts = 0;
    var highestThrowEver = 0;
    var highestThrowName = null;
    var perGameHighs = [];

    hist.forEach(function(g){
      var gameHighest = 0;
      (g.throws || []).forEach(function(entry){
        (entry.log || []).forEach(function(t){
          if (t.bust) {
            totalBusts += 1;
          } else if (typeof t.score === 'number') {
            if (t.score > highestThrowEver) {
              highestThrowEver = t.score;
              highestThrowName = g.mode === 'ffa' ? entry.who : t.thrower;
            }
            if (t.score > gameHighest) gameHighest = t.score;
          }
        });
      });
      perGameHighs.push(gameHighest);
    });

    var avgBustsPerGame = totalGames ? (totalBusts / totalGames) : 0;
    var avgHighestPerGame = perGameHighs.length ? (perGameHighs.reduce(function(a, b){ return a + b; }, 0) / perGameHighs.length) : 0;

    return {
      totalGames: totalGames,
      totalBusts: totalBusts,
      avgBustsPerGame: avgBustsPerGame,
      highestThrowEver: highestThrowEver,
      highestThrowName: highestThrowName,
      avgHighestPerGame: avgHighestPerGame
    };
  }

  function computeIndividualStats(hist){
    var map = {};
    function ensure(name){
      if (!map[name]) map[name] = { name: name, games: 0, wins: 0, busts: 0, highestThrow: 0, perGameHighs: [] };
      return map[name];
    }

    hist.forEach(function(g){
      var participantNames = [];
      if (g.mode === 'ffa') {
        participantNames = g.participants.slice();
      } else {
        g.participants.forEach(function(team){ team.forEach(function(n){ participantNames.push(n); }); });
      }

      var winners = g.mode === 'ffa' ? [g.winner] : (g.winnerMembers || []);
      var gameMax = {};
      var gameBusts = {};
      participantNames.forEach(function(n){ gameMax[n] = 0; gameBusts[n] = 0; });

      (g.throws || []).forEach(function(entry){
        (entry.log || []).forEach(function(t){
          var who = g.mode === 'ffa' ? entry.who : t.thrower;
          if (!who) return;
          if (t.bust) {
            gameBusts[who] = (gameBusts[who] || 0) + 1;
          } else if (typeof t.score === 'number') {
            if (t.score > (gameMax[who] || 0)) gameMax[who] = t.score;
          }
        });
      });

      participantNames.forEach(function(name){
        var rec = ensure(name);
        rec.games += 1;
        if (winners.indexOf(name) !== -1) rec.wins += 1;
        rec.busts += gameBusts[name] || 0;
        rec.perGameHighs.push(gameMax[name] || 0);
        if ((gameMax[name] || 0) > rec.highestThrow) rec.highestThrow = gameMax[name];
      });
    });

    return Object.keys(map).map(function(k){
      var r = map[k];
      var avgBustsPerGame = r.games ? (r.busts / r.games) : 0;
      var avgHighestPerGame = r.perGameHighs.length ? (r.perGameHighs.reduce(function(a, b){ return a + b; }, 0) / r.perGameHighs.length) : 0;
      return { name: r.name, games: r.games, wins: r.wins, busts: r.busts, avgBustsPerGame: avgBustsPerGame, highestThrow: r.highestThrow, avgHighestPerGame: avgHighestPerGame };
    }).sort(function(a, b){
      if (b.wins !== a.wins) return b.wins - a.wins;
      return b.games - a.games;
    });
  }

  function computeTeamStats(hist){
    var map = {};
    hist.forEach(function(g){
      if (g.mode !== 'teams') return;
      g.participants.forEach(function(team){
        var key = team.slice().sort().join(' & ');
        if (!map[key]) map[key] = { label: team.join(' & '), games: 0, wins: 0 };
        map[key].games += 1;
        if (g.winner === team.join(' & ')) map[key].wins += 1;
      });
    });
    return Object.keys(map).map(function(k){ return map[k]; }).sort(function(a, b){
      if (b.wins !== a.wins) return b.wins - a.wins;
      return b.games - a.games;
    });
  }

  function renderStatsTab(containerId){
    var app = document.getElementById(containerId || 'app');
    var hist = loadHistory();
    var manageHtml = managePlayersHtml();
    if (hist.length === 0) {
      app.innerHTML = manageHtml + '<div class="empty-state">No stats yet. Play a few games first.</div>';
      wireManagePlayers();
      return;
    }
    var overview = computeOverviewStats(hist);
    var indiv = computeIndividualStats(hist);
    var teams = computeTeamStats(hist);

    var highestCardBody = '<p class="m-value">' + overview.highestThrowEver + '</p>';
    if (overview.highestThrowName) {
      highestCardBody = '<p class="m-crown">&#128081;</p><p class="m-value">' + overview.highestThrowEver + '</p><p class="m-name">' + overview.highestThrowName + '</p>';
    }

    var overviewHtml =
      '<p class="section-heading" style="margin-top:0;">Overview</p>' +
      '<div class="metric-grid">' +
        '<div class="metric-card"><p class="m-label">Games played</p><p class="m-value">' + overview.totalGames + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Total busts</p><p class="m-value">' + overview.totalBusts + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Avg busts / game</p><p class="m-value">' + overview.avgBustsPerGame.toFixed(1) + '</p></div>' +
        '<div class="metric-card"><p class="m-label">Highest throw</p>' + highestCardBody + '</div>' +
        '<div class="metric-card"><p class="m-label">Avg highest / game</p><p class="m-value">' + overview.avgHighestPerGame.toFixed(1) + '</p></div>' +
      '</div>';

    function crownIcon(color){
      return '<svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px; margin-right:4px;" fill="' + color + '"><path d="M2 18h20l-2-9-4 3-4-6-4 6-4-3-2 9z"/></svg>';
    }
    function rankMedal(i){
      if (i === 0) return crownIcon('#f0c94f');
      if (i === 1) return crownIcon('#c0c0c0');
      if (i === 2) return crownIcon('#c67f3b');
      return '';
    }

    var indivRows = indiv.map(function(p, i){
      var winPct = p.games ? Math.round((p.wins / p.games) * 100) : 0;
      var safe = p.name.replace(/"/g, '&quot;');
      return '<tr><td>' + (i + 1) + '</td><td>' + rankMedal(i) + p.name + '</td><td>' + p.games + '</td><td>' + p.wins + '</td><td>' + winPct + '%</td><td>' + p.busts + '</td><td>' + p.avgBustsPerGame.toFixed(1) + '</td><td>' + p.highestThrow + '</td><td>' + p.avgHighestPerGame.toFixed(1) + '</td><td><button type="button" class="chip-settings purge-player-btn" data-name="' + safe + '" aria-label="Clear stats for ' + safe + '">&#10005;</button></td></tr>';
    }).join('');

    var html =
      manageHtml +
      overviewHtml +
      '<p class="section-heading">Individual leaderboard</p>' +
      '<div class="table-scroll"><table class="stats-table"><thead><tr><th>#</th><th>Player</th><th>Games</th><th>Wins</th><th>Win %</th><th>Busts</th><th>Avg busts</th><th>Highest</th><th>Avg highest</th><th></th></tr></thead>' +
      '<tbody>' + indivRows + '</tbody></table></div>';

    if (teams.length > 0) {
      var teamRows = teams.map(function(t, i){
        var winPct = t.games ? Math.round((t.wins / t.games) * 100) : 0;
        return '<tr><td>' + (i + 1) + '</td><td>' + rankMedal(i) + t.label + '</td><td>' + t.games + '</td><td>' + t.wins + '</td><td>' + winPct + '%</td></tr>';
      }).join('');
      html +=
        '<p class="section-heading">2v2 team leaderboard</p>' +
        '<div class="table-scroll"><table class="stats-table"><thead><tr><th>#</th><th>Team</th><th>Games</th><th>Wins</th><th>Win %</th></tr></thead>' +
        '<tbody>' + teamRows + '</tbody></table></div>';
    }

    app.innerHTML = html;
    wireManagePlayers();
  }

  function render(){
    var trippyBg = document.getElementById('trippy-bg');
    if (trippyBg) {
      trippyBg.style.display = 'block';
    }
    renderPlayTab();
    var historyPanel = document.getElementById('history-panel');
    if (historyPanel && historyPanel.style.display === 'block') renderHistoryTab('history-panel');
    var statsPanel = document.getElementById('stats-panel');
    if (statsPanel && statsPanel.style.display === 'block') renderStatsTab('stats-panel');
  }

  function initFooter(){
    var versionLabel = document.getElementById('version-label');
    if (versionLabel) versionLabel.textContent = 'v' + APP_VERSION;
    var panel = document.getElementById('changelog-panel');
    if (panel) {
      panel.innerHTML = CHANGELOG.map(function(c){
        return '<div class="cl-row"><span class="cl-v">v' + c.v + '</span><span class="cl-notes">' + c.notes + '</span></div>';
      }).join('');
    }
    var toggle = document.getElementById('changelog-toggle');
    if (toggle) {
      toggle.addEventListener('click', function(){
        if (panel.style.display === 'none') {
          panel.style.display = 'block';
          toggle.textContent = 'Hide changelog';
        } else {
          panel.style.display = 'none';
          toggle.textContent = 'Changelog';
        }
      });
    }
  }

  refreshRosterDatalist();
  initFooter();
  initSettingsPanel();
  initPlayersPanel();
  initHistoryStatsButtons();
  initGlobalMenuButton();
  initClickSounds();
  render();
})();
