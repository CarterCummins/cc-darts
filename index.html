<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Darts</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="theme-color" content="#14151a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CC Darts">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14151a;
    --card: #1e2028;
    --card-active: #23283a;
    --border: #2c2f3a;
    --border-accent: #5b8cff;
    --button-glow-color: #5b8cff;
    --box-glow-color: #5b8cff;
    --text: #eef0f5;
    --text-secondary: #9aa0b0;
    --text-muted: #6b7180;
    --danger: #e05a5a;
    --success: #4fce8a;
    --teamA: #5b8cff;
    --teamB: #e08a4f;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 70px 16px 64px;
  }
  #app-wrap { width: 100%; max-width: 760px; position: relative; z-index: 1; transition: max-width 0.15s ease; }
  #app-wrap.wide-play { max-width: 1040px; }
  #app { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.45); }
  h1 {
    font-family: 'Bungee', 'Poppins', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 1px;
    text-align: center;
    margin: 0 0 4px;
    background: linear-gradient(90deg, #ff4fd8, #4feaff, #7c4fff, #ffe75b, #ff4fd8);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: logoShift 10s ease-in-out infinite;
  }
  @keyframes logoShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @media (prefers-reduced-motion: reduce) {
    h1 { animation: none; }
  }
  .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin: 0 0 20px; }
  p.label { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px; }
  input, select, button { font-family: inherit; font-size: 15px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); color: var(--text); padding: 10px 12px; }
  input:focus, select:focus, button:focus { outline: none; border-color: var(--border-accent); }
  input[type="text"], input[type="number"] { width: 100%; }
  button { cursor: pointer; font-weight: 500; transition: transform 0.05s ease; }
  button:hover { border-color: var(--border-accent); }
  button:active { transform: scale(0.98); }
  .btn-primary { border: 2px solid var(--border-accent); color: var(--border-accent); background: var(--card); }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .mode-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-row button { flex: 1; }
  .mode-row button.active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  #first-row button { flex: 0 1 auto; }
  .count-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .count-row button { min-width: 44px; }
  .count-row button.active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  #name-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  #name-list input { margin-bottom: 0; }
  .team-block input { margin-bottom: 8px; }
  .team-block { background: var(--card); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
  .team-block .team-label { font-size: 13px; font-weight: 500; margin: 0 0 8px; }
  .team-block.a .team-label { color: var(--teamA); }
  .team-block.b .team-label { color: var(--teamB); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .player-card { background: var(--card); border-radius: var(--radius); padding: 16px; text-align: center; border: 1px solid var(--border); }
  .player-card.active { background: var(--card-active); border: 2px solid var(--border-accent); }
  .player-card .pname { font-size: 13px; color: var(--text-secondary); margin: 0 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-card.active .pname { color: var(--text); font-weight: 500; }
  .player-card .pscore { font-size: 32px; font-weight: 600; margin: 0; }
  .turn-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .turn-row p { margin: 0; font-size: 15px; flex: 1; }
  .entry-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .entry-row input { flex: 1; }
  .entry-row button { min-width: 90px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-muted); font-weight: 400; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th:last-child, td:last-child { text-align: right; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
  td:last-child { color: var(--text); }
  td.bust { color: var(--danger); }
  .reset-btn { width: 100%; margin-top: 20px; }
  .finish-wrap { text-align: center; padding: 40px 0; }
  .trophy { font-size: 48px; margin-bottom: 12px; }
  .winner-avatars { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
  .winner-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-accent); }
  .winner-name { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .winner-sub { font-size: 14px; color: var(--text-secondary); margin: 0 0 24px; }
  .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 0; }
  .history-item { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .history-item .hi-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .history-item .hi-date { font-size: 12px; color: var(--text-muted); }
  .history-item .hi-mode { font-size: 11px; color: var(--text-secondary); background: var(--card-active); padding: 2px 8px; border-radius: 20px; }
  .history-item .hi-winner { font-size: 14px; }
  .history-item .hi-winner b { color: var(--success); }
  .history-item .hi-participants { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .section-heading { font-size: 15px; font-weight: 500; margin: 24px 0 10px; }
  .section-heading:first-child { margin-top: 0; }
  .stats-table { margin-bottom: 8px; }
  .clear-btn { width: 100%; margin-top: 28px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 8px; }
  .metric-card { background: var(--card); border-radius: var(--radius); padding: 12px 14px; }
  .metric-card .m-label { font-size: 12px; color: var(--text-secondary); margin: 0 0 4px; }
  .metric-card .m-value { font-size: 22px; font-weight: 600; margin: 0; }
  .metric-card .m-crown { font-size: 18px; margin: 0 0 2px; line-height: 1; }
  .metric-card .m-name { font-size: 12px; color: var(--text-secondary); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .table-scroll { overflow-x: auto; margin-bottom: 8px; }
  .table-scroll table { min-width: 480px; }
  .chip-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 20px; align-items: start; }
  .chip-row .edit-panel { grid-column: 1 / -1; }
  .chip { padding: 7px 14px; border-radius: 20px; font-size: 13px; }
  .picker-row { display: flex; align-items: center; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 8px 6px 10px; }
  .picker-row.used { border: 2px solid var(--border-accent); background: var(--card-active); }
  .picker-select { flex: 1; display: flex; align-items: center; gap: 10px; text-align: left; padding: 4px 2px; min-width: 0; background: none; border: none; border-radius: 0; }
  .picker-edit-btn { background: none; border: none; padding: 6px; border-radius: 50%; color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
  .picker-edit-btn:hover { color: var(--text); border-color: transparent; }
  .picker-row button::after { content: none; }
  .picker-avatar { width: 28px; height: 28px; font-size: 12px; flex-shrink: 0; }
  .picker-name { flex: 1; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .picker-check { font-size: 14px; color: var(--success); flex-shrink: 0; }
  .chip.used { border-color: var(--border-accent); color: var(--border-accent); background: var(--card-active); }
  .chip-check { font-style: normal; }
  .chip-wrap { display: inline-flex; align-items: center; gap: 4px; }
  .chip-settings { padding: 6px 8px; border-radius: 20px; font-size: 12px; color: var(--text-muted); line-height: 1; }
  .chip-settings:hover { color: var(--text); }
  .edit-panel { background: var(--card); border-radius: var(--radius); padding: 14px; margin-top: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
  .linked-input-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .linked-input-row input { flex: 1; }
  .search-spotify-btn { flex: 0 0 auto; padding: 8px 10px; font-size: 14px; }
  .avatar-preview { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--card-active); display: block; }
  .avatar-placeholder { display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; color: var(--text-secondary); }
  .photo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .photo-row-actions { display: flex; flex-direction: column; gap: 6px; }
  .photo-row-actions button { font-size: 12px; padding: 7px 12px; }
  .turn-row .avatar-preview, .turn-row .avatar-placeholder { width: 32px; height: 32px; font-size: 14px; flex-shrink: 0; }
  .player-row-avatar { width: 36px; height: 36px; font-size: 15px; flex-shrink: 0; }
  .stat-card { margin-bottom: 8px; }
  .stat-row { width: 100%; display: flex; align-items: center; gap: 10px; text-align: left; padding: 10px 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .stat-rank { font-size: 12px; color: var(--text-muted); min-width: 24px; display: flex; align-items: center; }
  .stats-avatar { width: 32px; height: 32px; font-size: 13px; flex-shrink: 0; }
  .stat-name { flex: 1; font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-quick { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .stat-chevron { font-size: 12px; color: var(--text-muted); }
  .stat-detail { background: var(--card-active); border-radius: var(--radius); padding: 12px; margin-top: 4px; }
  .app-footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--text-muted); background: var(--card); border-radius: var(--radius); padding: 12px 14px; }
  .app-footer button { background: none; border: none; padding: 0; font-size: 12px; color: var(--text-muted); text-decoration: underline; cursor: pointer; }
  .changelog-panel { text-align: left; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .changelog-panel .cl-row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .changelog-panel .cl-row:last-child { border-bottom: none; }
  .changelog-panel .cl-v { color: var(--text); font-weight: 500; white-space: nowrap; }
  .changelog-panel .cl-notes { color: var(--text-secondary); }
  .snippet-box { background: var(--card); border: 1px solid var(--border-accent); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; }
  .embed-fallback { margin-top: 8px; }
  .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .game-card { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 14px; text-align: left; border-radius: 12px; }
  .game-card-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .game-card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .trippy-fullscreen { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #08080c; animation: trippyHue 9s linear infinite; pointer-events: none; }
  .blob { position: absolute; width: 46vmin; height: 46vmin; border-radius: 50%; filter: blur(60px); opacity: 0.85; mix-blend-mode: screen; }
  .blob.b1 { background: #ff4fd8; top: -8%; left: -8%; animation: blobFloat1 15s ease-in-out infinite; }
  .blob.b2 { background: #4feaff; top: -6%; right: -10%; animation: blobFloat2 19s ease-in-out infinite; }
  .blob.b3 { background: #fff24f; bottom: -12%; left: 12%; animation: blobFloat3 17s ease-in-out infinite; }
  .blob.b4 { background: #7c4fff; bottom: -14%; right: 6%; animation: blobFloat4 21s ease-in-out infinite; }
  .blob.b5 { background: #4fff8f; top: 34%; left: 34%; animation: blobFloat5 13s ease-in-out infinite; }
  .choose-game-panel { position: relative; z-index: 1; }
  @keyframes trippyHue { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  @keyframes blobFloat1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40vw, 40vh) scale(1.35); } }
  @keyframes blobFloat2 { 0%, 100% { transform: translate(0, 0) scale(1.1); } 50% { transform: translate(-40vw, 35vh) scale(0.85); } }
  @keyframes blobFloat3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30vw, -35vh) scale(1.25); } }
  @keyframes blobFloat4 { 0%, 100% { transform: translate(0, 0) scale(1.15); } 50% { transform: translate(-30vw, -30vh) scale(0.9); } }
  @keyframes blobFloat5 { 0%, 100% { transform: translate(-15vw, -10vh) scale(0.9); } 50% { transform: translate(20vw, 25vh) scale(1.3); } }
  @media (prefers-reduced-motion: reduce) {
    .trippy-fullscreen, .blob { animation: none !important; }
  }
  .cricket-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 320px; }
  .cricket-table th, .cricket-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: center; }
  .cricket-table th:first-child, .cricket-table td.cricket-label { text-align: left; color: var(--text-secondary); }
  .cricket-mark { letter-spacing: 2px; }
  .cricket-target-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin-top: 12px; }
  .cricket-target.dead { color: var(--text-muted); border-color: var(--border); }
  .settings-fab { position: fixed; top: 14px; left: 14px; z-index: 50; width: 38px; height: 38px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .menu-fab { position: fixed; top: 14px; left: 60px; z-index: 50; display: flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 22px; font-size: 14px; font-weight: 500; }
  .top-right-controls { position: fixed; top: 14px; right: 14px; z-index: 50; display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; max-width: calc(100vw - 28px); }
  .players-fab { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 22px; font-size: 14px; font-weight: 500; }
  .settings-panel label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .settings-panel input[type="color"] { width: 100%; height: 36px; padding: 2px; margin-top: 4px; cursor: pointer; }
  .settings-section-heading { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin: 18px 0 10px; padding-top: 14px; border-top: 1px solid var(--border); }
  .settings-section-heading:first-child { margin-top: 0; padding-top: 0; border-top: none; }
  .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .player-row { display: flex; align-items: center; gap: 8px; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); }
  .player-row-info { flex: 1; min-width: 0; }
  .player-row-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-row-stats { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .player-row-edit { font-size: 12px; padding: 6px 10px; flex-shrink: 0; }
  .theme-swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
  .theme-swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 2px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; }
  .theme-swatch:hover { border-color: var(--border-strong); }
  .theme-swatch .swatch-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); }
  .theme-swatch .swatch-label { font-size: 10px; color: var(--text-muted); }
  .sound-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .sound-btn { font-size: 12px; padding: 6px 10px; }
  .sound-btn.active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  .lib-search-results { max-height: 260px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); }
  .lib-search-result-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .lib-search-result-item:last-child { border-bottom: none; }
  .lib-search-result-item:hover { background: var(--card-active); }
  .lib-search-cover { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--card-active); }
  .lib-search-info { flex: 1; min-width: 0; }
  .lib-search-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-search-artist { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-track-cover { width: 120px; height: 120px; border-radius: 14px; object-fit: cover; flex-shrink: 0; background: var(--card-active); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .lib-row-cover { width: 24px; height: 24px; border-radius: 5px; object-fit: cover; flex-shrink: 0; background: var(--card-active); }
  @media (max-width: 760px) {
    .menu-fab, .players-fab { padding: 9px 10px; gap: 0; }
    .menu-fab .btn-label, .players-fab .btn-label { display: none; }
    .menu-fab { left: 56px; }
    .top-right-controls { gap: 6px; }
  }
  @media (max-width: 480px) {
    .dart-keypad { grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px; }
    .dart-cell { padding: 4px; }
    .dart-num-btn { font-size: 13px; padding: 6px 2px; }
    .dart-mult-btn { font-size: 11px; padding: 5px 2px; }
    .dart-cell-mults { gap: 3px; margin-top: 3px; }
  }
  .players-fab.tab-active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  .settings-fab.tab-active { border: 2px solid var(--border-accent); color: var(--border-accent); }
  .dart-keypad { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; padding: 10px; border-radius: var(--radius); }
  .dart-cell { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; text-align: center; }
  .dart-cell-mults { display: flex; gap: 4px; justify-content: center; margin-top: 4px; }
  .dart-mult-btn { flex: 1; padding: 8px 4px; font-size: 13px; font-weight: 600; }
  .dart-num-btn { width: 100%; font-size: 16px; font-weight: 700; padding: 8px 4px; }
  .dart-mult-btn.miss-btn { background: var(--card-active); color: var(--danger); border-color: var(--danger); }
  .bull-cell .dart-cell-mults { flex-direction: column; }
  .dart-mult-btn .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .green-dot { background: var(--success); }
  .red-dot { background: var(--danger); }
  .turn-darts-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; min-height: 30px; }
  .turn-dart-chip { background: var(--card-active); border-radius: 16px; padding: 5px 12px; font-size: 13px; font-weight: 500; }
  .turn-dart-chip.empty-slot { background: transparent; border: 1px dashed var(--border); color: var(--text-muted); }
  .turn-total-line { text-align: center; font-size: 17px; font-weight: 600; color: var(--text); margin: -4px 0 12px; }
  .turn-total-line .turn-total-sofar { font-size: 13px; font-weight: 400; color: var(--text-secondary); }
  .undo-btn { width: 100%; margin-top: 10px; }
  .undo-btn:disabled { opacity: 0.35; cursor: default; }
  .atc-dartboard-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .atc-dartboard { width: 100%; max-width: 320px; height: auto; display: block; touch-action: manipulation; }

<script>
(function(){
  var ROSTER_KEY = 'darts_roster_v1';
  var HISTORY_KEY = 'darts_history_v1';
  var PROFILES_KEY = 'darts_profiles_v1';
  var LIBRARY_KEY = 'darts_library_v1';
  var THEME_KEY = 'darts_theme_v1';
  var DEFAULT_THEME = { bg: '#14151a', card: '#1e2028', accent: '#5b8cff', buttonGlow: '#5b8cff', boxGlow: '#5b8cff' };
  var PRESET_THEMES = [
    { name: 'Midnight', bg: '#14151a', card: '#1e2028', accent: '#5b8cff' },
    { name: 'Forest', bg: '#0f1a14', card: '#16261d', accent: '#4fce8a' },
    { name: 'Sunset', bg: '#1a1210', card: '#261a16', accent: '#e08a4f' },
    { name: 'Crimson', bg: '#1a1113', card: '#261619', accent: '#e05a5a' },
    { name: 'Royal', bg: '#141220', card: '#1e1a30', accent: '#a06be0' },
    { name: 'Gold', bg: '#1a1608', card: '#26210f', accent: '#f0c94f' },
    { name: 'Ocean', bg: '#0d1620', card: '#132230', accent: '#4fc3e0' },
    { name: 'Mono', bg: '#121212', card: '#1c1c1c', accent: '#d0d0d0' }
  ];

  var SOUND_KEY = 'darts_sound_v1';
  var SOUND_VOLUME_KEY = 'darts_sound_volume_v1';
  var MUSIC_ENABLED_KEY = 'darts_music_enabled_v1';
  var MUSIC_VOLUME_KEY = 'darts_music_volume_v1';
  var NEW_PLAYER_SENTINEL = '\u0000__new_player__\u0000';
  var SOUND_OPTIONS = ['none', 'ping', 'doing', 'splat', 'mush', 'acid', 'wub', 'ring'];
  var audioCtx = null;
  var masterGainNode = null;

  function loadSoundSetting(){
    try { return localStorage.getItem(SOUND_KEY) || 'none'; } catch(e){ return 'none'; }
  }
  function saveSoundSetting(v){
    try { localStorage.setItem(SOUND_KEY, v); } catch(e){}
  }
  function loadSoundVolume(){
    try {
      var v = parseFloat(localStorage.getItem(SOUND_VOLUME_KEY));
      return isNaN(v) ? 0.6 : Math.min(1, Math.max(0, v));
    } catch(e){ return 0.6; }
  }
  function saveSoundVolume(v){
    try { localStorage.setItem(SOUND_VOLUME_KEY, String(v)); } catch(e){}
  }
  function setClickVolume(v){
    saveSoundVolume(v);
    if (masterGainNode) masterGainNode.gain.value = v;
  }
  function getMasterGain(ctx){
    if (!masterGainNode) {
      masterGainNode = ctx.createGain();
      masterGainNode.gain.value = loadSoundVolume();
      masterGainNode.connect(ctx.destination);
    }
    return masterGainNode;
  }
  function loadMusicEnabled(){
    try {
      var v = localStorage.getItem(MUSIC_ENABLED_KEY);
      return v === null ? true : v === 'true';
    } catch(e){ return true; }
  }
  function saveMusicEnabled(v){
    try { localStorage.setItem(MUSIC_ENABLED_KEY, v ? 'true' : 'false'); } catch(e){}
  }
  function loadMusicVolume(){
    try {
      var v = parseFloat(localStorage.getItem(MUSIC_VOLUME_KEY));
      return isNaN(v) ? 0.8 : Math.min(1, Math.max(0, v));
    } catch(e){ return 0.8; }
  }
  function saveMusicVolume(v){
    try { localStorage.setItem(MUSIC_VOLUME_KEY, String(v)); } catch(e){}
  }
  var musicGainNode = null;
  function getMusicGain(ctx){
    if (!musicGainNode) {
      musicGainNode = ctx.createGain();
      musicGainNode.gain.value = loadMusicVolume();
      musicGainNode.connect(ctx.destination);
    }
    return musicGainNode;
  }
  function setMusicVolume(v){
    saveMusicVolume(v);
    if (musicGainNode) musicGainNode.gain.value = v;
    Object.keys(window.__ckdAudio || {}).forEach(function(k){
      var a = window.__ckdAudio[k];
      if (a) a.volume = v;
    });
  }

  function getAudioCtx(){
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch(e){}
    }
    return audioCtx;
  }
  function makeNoiseBuffer(ctx, duration){
    var size = Math.floor(ctx.sampleRate * duration);
    var buffer = ctx.createBuffer(1, size, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    return buffer;
  }
  function playPing(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(950, t + 0.12);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain).connect(getMasterGain(ctx));
    osc.start(t);
    osc.stop(t + 0.22);
  }
  function playDoing(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.linearRampToValueAtTime(640, t + 0.08);
    osc.frequency.linearRampToValueAtTime(180, t + 0.24);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(gain).connect(getMasterGain(ctx));
    osc.start(t);
    osc.stop(t + 0.3);
  }
  function playSplat(ctx){
    var t = ctx.currentTime;
    var noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, 0.22);
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3200, t);
    filter.frequency.exponentialRampToValueAtTime(180, t + 0.18);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    noise.connect(filter).connect(gain).connect(getMasterGain(ctx));
    noise.start(t);
    noise.stop(t + 0.22);
  }
  function playMush(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(65, t + 0.3);
    var oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.3, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.34);
    var noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, 0.3);
    var noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 350;
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.14, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(oscGain).connect(getMasterGain(ctx));
    noise.connect(noiseFilter).connect(noiseGain).connect(getMasterGain(ctx));
    osc.start(t); osc.stop(t + 0.34);
    noise.start(t); noise.stop(t + 0.3);
  }
  function playAcid(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, t);
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 16;
    filter.frequency.setValueAtTime(2400, t);
    filter.frequency.exponentialRampToValueAtTime(220, t + 0.26);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.22, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.connect(filter).connect(gain).connect(getMasterGain(ctx));
    osc.start(t);
    osc.stop(t + 0.3);
  }
  function playWub(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(75, t);
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 14;
    filter.frequency.setValueAtTime(180, t);
    filter.frequency.linearRampToValueAtTime(1400, t + 0.06);
    filter.frequency.linearRampToValueAtTime(140, t + 0.12);
    filter.frequency.linearRampToValueAtTime(1200, t + 0.18);
    filter.frequency.linearRampToValueAtTime(110, t + 0.26);
    filter.frequency.linearRampToValueAtTime(900, t + 0.32);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.32, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.36);
    osc.connect(filter).connect(gain).connect(getMasterGain(ctx));
    osc.start(t);
    osc.stop(t + 0.38);
  }
  function playRing(ctx){
    var t = ctx.currentTime;
    var osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1900, t);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, t);
    var pulseCount = 4;
    var pulseDur = 0.045;
    var gapDur = 0.03;
    for (var i = 0; i < pulseCount; i++) {
      var start = t + i * (pulseDur + gapDur);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.2, start + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + pulseDur);
    }
    osc.connect(gain).connect(getMasterGain(ctx));
    osc.start(t);
    osc.stop(t + pulseCount * (pulseDur + gapDur) + 0.05);
  }
  function playClickSound(type){
    var kind = type || loadSoundSetting();
    if (kind === 'none') return;
    var ctx = getAudioCtx();
    if (!ctx) return;
    function fire(){
      if (kind === 'ping') playPing(ctx);
      else if (kind === 'doing') playDoing(ctx);
      else if (kind === 'splat') playSplat(ctx);
      else if (kind === 'mush') playMush(ctx);
      else if (kind === 'acid') playAcid(ctx);
      else if (kind === 'wub') playWub(ctx);
      else if (kind === 'ring') playRing(ctx);
    }
    if (ctx.state === 'suspended' && ctx.resume) {
      ctx.resume().then(fire).catch(fire);
    } else {
      fire();
    }
  }
  function initClickSounds(){
    document.addEventListener('click', function(e){
      var target = e.target.closest('button, .game-card, .chip, .theme-swatch');
      if (!target) return;
      playClickSound();
    });
  }
  function vibrate(pattern){
    if (navigator.vibrate) {
      try { navigator.vibrate(pattern); } catch(e){}
    }
  }
  var SILENT_WAV = 'data:audio/wav;base64,UklGRiwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQgAAACAgICAgICAgA==';
  var persistentAudioEls = {};
  function getPersistentAudio(containerId){
    if (!persistentAudioEls[containerId]) {
      var el = new Audio();
      el.setAttribute('playsinline', '');
      el.style.display = 'none';
      document.body.appendChild(el);
      persistentAudioEls[containerId] = el;
    }
    return persistentAudioEls[containerId];
  }
  var audioUnlocked = false;
  function unlockAudioPlayback(){
    if (audioUnlocked) return;
    audioUnlocked = true;
    try {
      var ctx = getAudioCtx();
      if (ctx) {
        var t = ctx.currentTime;
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.05, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
        osc.connect(gain).connect(getMasterGain(ctx));
        osc.start(t);
        osc.stop(t + 0.1);
      }
    } catch(e){}
    ['snippet-embed', 'win-song-embed'].forEach(function(id){
      try {
        var el = getPersistentAudio(id);
        el.src = SILENT_WAV;
        el.load();
        el.volume = 0.01;
        var p = el.play();
        if (p && p.catch) p.catch(function(){});
      } catch(e){}
    });
  }
  function initAudioUnlock(){
    var opts = { capture: true, once: true, passive: true };
    document.addEventListener('touchstart', unlockAudioPlayback, opts);
    document.addEventListener('touchend', unlockAudioPlayback, opts);
    document.addEventListener('mousedown', unlockAudioPlayback, opts);
    document.addEventListener('click', unlockAudioPlayback, opts);
  }

  var APP_VERSION = '4.8.11';
  var CHANGELOG = [
    { v: '4.8.11', notes: 'Around the Clock now has an actual dartboard graphic instead of a grid of number buttons \u2014 tap the wedge you hit (numbers laid out in real dartboard order, plus the bullseye in the middle). Your target wedge is highlighted, and each number greys out and locks once you\u2019ve passed it, so you can\u2019t double-tap it by mistake. Miss and Undo stay as buttons underneath.' },
    { v: '4.8.10', notes: 'Stats now show Avg misses / game (overview) and Avg misses (per player), matching the existing Avg busts stat. Settings is also wider now on tablet/desktop screens, and the four appearance color pickers sit side-by-side instead of stacked, so there\u2019s a lot less scrolling to see everything.' },
    { v: '4.8.9', notes: 'In History, a solo practice game now says "Solo Round: [name]" instead of "Winner: [name]" \u2014 fitting, since it matches the same call last version made to keep solo games out of Stats.' },
    { v: '4.8.8', notes: 'Solo practice games (1-player Free for all) no longer count toward Stats \u2014 no wins/losses, no leaderboard entry, no recent-games entry, since there was no opponent to actually beat. They still show up in History as a record that you played, just excluded from the Stats page and the Players tab\u2019s quick stat line.' },
    { v: '4.8.7', notes: 'Settings is now a pop-out panel instead of taking over the whole screen \u2014 tap the gear mid-game to adjust theme, sound, or music volume, then close it and you\u2019re back exactly where you left off, game intact. Tap the X or tap outside the panel to close it.' },
    { v: '4.8.6', notes: 'Snippet trigger is back to 50+ per turn instead of 70+ (and the Settings/game description text matches again) \u2014 turns out that was a tougher bar than intended. Also, a player\u2019s recent-games list in Stats now shows who they played against on each result, not just Won/Lost.' },
    { v: '4.8.5', notes: 'Finally found the real cause of the song playback issues \u2014 the diagnostic line from last version showed "HTTP 403" errors, which means Deezer\u2019s preview links quietly expire after a while (that\u2019s on their end, not a bug in the app). Songs now fetch a fresh, working preview link right before every single play, so a song that stops working after sitting for a while will just start working again on its own, without needing to delete and re-add it. Also fixed a bug where hitting Main Menu right after winning could restart or double-play the win song for a moment before it stopped. And two layout changes: the player-name text boxes in game setup, and every card in the Players tab, are now a responsive grid instead of one-per-row, so they take up a lot less vertical space \u2014 all the same info is still there, just packed tighter.' },
    { v: '4.8.4', notes: 'Still chasing the song playback issue \u2014 rather than guess at another fix blind, this version adds a tiny diagnostic line (small grey text, not a button) that appears under a song\u2019s title only when it fails to play, showing the actual technical reason. If it still happens, screenshot or read out what that line says \u2014 it\u2019ll say exactly why (network error, blocked request, decode failure, etc.) instead of just going quiet, which will point to the real fix instead of another guess.' },
    { v: '4.8.3', notes: 'Rebuilt how snippets and win songs actually play, since the previous fix still wasn\u2019t reliable and the fallback "Play" button that appeared on failure wasn\u2019t even clickable. They now play through the same audio engine your click sounds already use reliably, instead of a standard audio player that iOS Safari can silently block. That engine, once unlocked on your first tap, doesn\u2019t need a fresh permission check for every single play \u2014 so it should now autoplay consistently, every time, for every player. There\u2019s no more Play button; if a song genuinely can\u2019t load, it now fails silently instead of showing a broken control.' },
    { v: '4.8.2', notes: 'Fixed inconsistent song playback \u2014 two real bugs. First: saving a player\u2019s songs from the in-game player picker (as opposed to the Players tab) was silently cutting their song list down to 3, even though the picker lets you choose up to 5, so a player\u2019s 4th/5th song could never play. Second, and the bigger one: since v4.7.2 win songs and snippets reuse the same audio player instead of creating a new one each time, but it was missing an explicit reload step when switching to a different song\u2019s file \u2014 on some phones that meant only songs the player had happened to load before would actually play, while a genuinely new song would fail silently. Both are fixed now, and a failed song shows a manual Play button instead of just going quiet.' },
    { v: '4.8.1', notes: 'The saved-players picker in game setup is now a responsive grid instead of one player per row \u2014 several players fit side by side, so a long roster no longer means a lot of scrolling to reach the "Start game" button. Tapping a player\u2019s edit gear still expands their edit form the same as before, now spanning the full width beneath their row.' },
    { v: '4.8.0', notes: 'Added solo/single-player mode \u2014 pick 1 player in Free for all setup for practice: countdown games work as a normal solo countdown, Around the Clock tracks your own hits, and Cricket wins as soon as you\u2019ve closed every number (no opponents to beat). The trivial "Who goes first?" picker is skipped when it\u2019s just you. Also widened the app so the dart keypad, player cards, and Cricket/Around the Clock boards can spread across more of the screen during an active game and fit with less scrolling, especially on tablets or wider browser windows \u2014 the setup and stats screens stay a bit narrower for readability.' },
    { v: '4.7.3', notes: 'Removed the standalone Music tab from the top bar \u2014 it was a separate browse-and-manage-everything page that\u2019s redundant now that every player\u2019s edit screen already has its own search box to find and add songs directly. Song search, the shared song library, and win songs/snippets all still work exactly the same; it\u2019s just no longer a dedicated tab up top.' },
    { v: '4.7.2', notes: 'Strengthened the iOS Safari audio fix from v4.7.1, since it was still inconsistent \u2014 turned out the real problem was that every snippet and win song created a brand-new audio player behind the scenes, and iOS doesn\u2019t reliably carry the "okay to play sound" permission over to a player it hasn\u2019t seen before. Snippets and win songs now reuse the same two players for the whole session instead of creating fresh ones each time, and the very first tap anywhere primes those specific players (plus the click-sound engine) as early as possible, before anything else can grab the phone\u2019s audio.' },
    { v: '4.7.1', notes: 'Fixed a known iOS Safari quirk where win songs and 70+ snippets stayed silent until you pressed the physical volume button \u2014 Safari sometimes won\u2019t route audio out loud from a freshly created player until the phone\u2019s audio hardware gets "woken up." The app now quietly primes audio playback on your very first tap anywhere, before any snippet or win song needs to play, so it should work without needing to touch the volume button.' },
    { v: '4.7.0', notes: 'CC Darts is now installable as a real app: "Add to Home Screen" gives it a proper dartboard icon and a full-screen launch (no browser bar), and it now works offline if your connection drops mid-game. Added haptic feedback \u2014 a light tap on every dart scored, a firmer double-buzz on a bust, and a celebratory buzz pattern on the win (Android only; iOS Safari doesn\u2019t support vibration). Reworked the saved-players picker: the edit gear is now built into the same row instead of a separate button next to it, and tapping it expands the edit form right under that player instead of jumping to a panel at the bottom of the list.' },
    { v: '4.6.0', notes: 'Removed the "Background" color picker from Settings \u2014 it never actually did anything since the animated background sits on top of it, so it was just a dead control. Fixed the last couple of spots still saying "50+" for the win-song snippet trigger; it\u2019s been 70+ since v4.0.0. Saved-players picker in game setup now shows everyone\u2019s profile photo and is laid out as a clean list (avatar, name, checkmark when selected) instead of a row of cramped chips. Stats now track total misses per player, shown in both the leaderboard and the detailed breakdown. The dart chips and "X needed to win" during a turn are now centered and noticeably bigger so the number you actually need is easy to read at a glance.' },
    { v: '4.5.1', notes: 'Actually fixed the changelog glow this time \u2014 the glow was on the changelog list itself, which stays hidden until you tap "Changelog", so it was never visible. Moved the glowing card background onto the footer bar itself (version + Changelog button), which is always on screen. Stats: losses now show next to wins in both the leaderboard quick-view and each player\u2019s detailed breakdown. History log: free-for-all games now show "Player vs Player" instead of a plain comma-separated list (2v2 already showed team vs team).' },
    { v: '4.5.0', notes: 'Added a Music section in Settings: a toggle to turn win songs and 50+ snippets on or off entirely (on by default), plus their own Music Volume slider separate from click sounds. Renamed the old "Volume" slider to "Sound FX Volume" for clarity. Stats page: individual leaderboard rows now show each player\u2019s profile photo next to their rank, and tapping a row expands it into a detail panel with their full stat breakdown (games, wins, busts, highest throw, avg pts/dart) plus their 5 most recent games and results.' },
    { v: '4.4.1', notes: 'Changelog card at the bottom now glows the same way every other card in the app does, instead of the extra-subtle glow it had before. Removed the glow from the "Changelog" toggle text itself so it\u2019s just the card glowing, not the button.' },
    { v: '4.4.0', notes: 'Win screen now shows the winner\u2019s profile photo above the trophy \u2014 only if they actually have one set, no blank placeholder circles. Settings moved out of the floating popout and into its own full page, matching Music/History/Stats/Players (same gear icon, tap it to switch there). Fixed a "429 Too Many Requests" error from GitHub that could hit the live app link under concurrent traffic: the delivery Worker was still pointed at the old ck-darts repo name (bouncing through a redirect on every load) and only cached for 30 seconds, so several people opening the link around the same time could exhaust GitHub\u2019s rate limit. Repointed it straight at the current repo and bumped the cache to an hour.' },
    { v: '4.3.0', notes: 'Button/box glow now animates opacity on a static shadow layer instead of animating the shadow itself \u2014 much smoother, no more fragmented/laggy pulsing. Rebalanced glow placement: the outer app card gets the glow trim; the dart pad, Around the Clock board, and Cricket grid don\u2019t glow at all since that just added clutter on dense button grids. Added a Volume slider under Click sounds in Settings so you can turn sound effects up or down without muting them. Fixed a bug where typing a player\u2019s name and then adding their first song (either when creating a new player or editing one) would wipe out the name you\u2019d just typed. Countdown games (200/501/301/170) now show how much you need left to win after every single dart, not just at the end of your turn \u2014 on a bust it correctly reflects back to what you started the turn with, since your score doesn\u2019t actually change until the turn settles.' },
    { v: '4.2.1', notes: 'Rebalanced the glow placement based on feedback: the outer app card now gets the glow trim around its edge. The dart pad, Around the Clock board, and Cricket number grid no longer glow at all \u2014 those are dense button grids where the glow just added clutter. Snippet/win-song boxes keep their glow as before.' },
    { v: '4.2.0', notes: 'Big polish pass: button glow is now very subtle, while boxes/cards get a stronger, separately-customizable glow (new Button glow color and Box glow color pickers in Settings). Changelog now has its own subtle-glow box and loads 5 entries at a time. Fixed the win screen showing the song info twice, and fixed the win song overlapping with a still-playing 50+ snippet from the same game \u2014 winning now always cuts the snippet immediately. 50+ snippets now also play for 501 and 301, not just 200. The dart pad: tap the number itself for a single, x2/x3 stay separate, and the bullseye is labeled Bullseye with Green (25) / Red (50) color dots. Around the Clock is now a clickable dartboard-style number grid instead of a hit-count entry, with Miss and Undo. Cricket got a Miss button. Removed the manual "add song by URL" option from the Music tab since search covers it. Settings got reorganized into clear sections and is wider; the top-bar collapse to icon-only now kicks in earlier so it doesn\u2019t overlap on resized desktop windows, not just phones. Player photo upload now supports drag-and-drop. Mobile screens show the dart pad in a denser 4-column layout so more of it fits without scrolling (desktop layout unchanged).' },
    { v: '4.1.0', notes: 'Creating a player in the Players tab now lets you add a photo and songs right away instead of adding the name first and editing after. The slow glow effect from the 50+ snippet box now runs across buttons and cards throughout the app. Win screen is more exciting ("Matt WINS!") and just shows the song info + art without the possessive label. The 50+ snippet box now shows the song title, centered under the art. The win song stops playing as soon as you leave the win screen for another tab or game. History only loads the last 5 games with a "View More" button for the rest. Added two new click sounds in Settings: Wub (a synthesized dubstep-style bass wobble) and Ring (a synthesized pulsing alarm-style tone).' },
    { v: '4.0.0', notes: 'Big update: (1) Countdown scoring is now a tap-to-score dart keypad \u2014 pick a number and a \u00d71/\u00d72/\u00d73 multiplier (plus Bull and Miss) instead of typing a total; the app does the math. Added a universal Undo button (countdown, Around the Clock, and Cricket) to fix a misclick. (2) The 50+ snippet now triggers off your full 3-dart turn total (over 70 combined) instead of any single throw, since a fast turn could otherwise trigger it repeatedly \u2014 snippet length bumped to 15 seconds. (3) Music/History/Stats/Players are now full pages instead of small popouts, so there\u2019s room for more detail and they actually fit the screen. (4) You can add a new player directly from the Players tab. (5) The 50+ snippet box no longer shows a name \u2014 just album art with a slow glowing highlight. Win-screen album art is much bigger. Songs no longer repeat back-to-back for the same player, and the cap per player is now 5 songs instead of 3. (6) Removed the scattered "clear player stats" buttons from History and Stats \u2014 Delete Player now only lives in the Players tab. (7) Stats now show average points per dart, both per-player and overall.' },
    { v: '3.3.1', notes: 'Renamed the app from CM Darts to CC Darts (title, header, and backup filename).' },
    { v: '3.3.0', notes: 'Music library is now its own tab (top-right, next to History/Stats/Players) instead of buried in Settings \u2014 easier to manage as the song list grows. Also reworked how players get songs: instead of adding to the library first then picking from a checklist, each player\u2019s edit screen now has its own search box \u2014 search and tap a result to add it directly to that player\u2019s 3 slots in one step (it\u2019s added to the shared library automatically if it wasn\u2019t already there).' },
    { v: '3.2.1', notes: 'Fixed the Main menu button (top-left) overlapping the History/Stats/Players pills (top-right) on narrow phone screens \u2014 those buttons now shrink to icon-only under 480px wide so there\u2019s always room for both sides.' },
    { v: '3.2.0', notes: 'Added a searchable song picker in the Music Library (Settings) \u2014 type a song or artist and pick from a live dropdown with cover art and 30-second previews, powered by Deezer\u2019s free public catalog (no login needed, unlike Spotify which killed preview access). Manual URL entry is still there as a fallback. Cover art now shows next to songs in the picker and on the win screen.' },
    { v: '3.1.0', notes: 'Renamed the app from CK Darts to CM Darts (title, header, and backup filename). GitHub repo and live URL moved to cm-darts as well.' },
    { v: '3.0.0', notes: 'Removed Spotify integration entirely \u2014 Spotify deprecated 30-second preview URLs across their Web API on Nov 27, 2024, so preview_url now returns null for nearly every track, for every developer, with no workaround. Replaced it with a self-hosted music library: add songs by URL in Settings, then pick up to 3 per player for their win songs/snippets. Playback is a real audio element you fully control, so autoplay is reliable.' },
    { v: '2.19.0', notes: 'Replaced the Spotify iframe embed with real audio playback: song/snippet previews now go through the ck-darts-proxy Worker (which handles the Spotify token exchange server-side, avoiding the CORS block) and play via a native audio element triggered directly from your click. This is what actually satisfies browser autoplay policy, since a cross-origin iframe never reliably did. Falls back to a manual play button if autoplay is blocked, or an "Open in Spotify" link if no 30s preview exists for that track.' },
    { v: '2.18.1', notes: 'Removed loading="lazy" from the Spotify iframe \u2014 it was deferring iframe initialization, which could push it past the moment your click grants autoplay permission. Worth a fresh test.' },
    { v: '2.18.0', notes: 'Removed the Spotify Developer credentials feature \u2014 confirmed it can never work from a plain HTML file, since Spotify blocks direct browser requests to their token endpoint with CORS (a known, years-old restriction on their end). Back to one honest approach: the plain embed with autoplay, and the \u25b6 Play button as the reliable manual backup.' },
    { v: '2.17.1', notes: 'Export/Import now includes your Spotify Client ID/Secret \u2014 previously they weren\u2019t carried over, so a phone or new device would fall back to the old embed method until you re-entered them.' },
    { v: '2.17.0', notes: 'Added real Spotify Web API playback: enter your free Developer Client ID/Secret in Settings and win songs/snippets play actual ~30s preview clips through a real audio element, which autoplays reliably (not subject to the iframe autoplay issues). Falls back automatically to the old embed method if no credentials are set or a preview isn\u2019t available.' },
    { v: '2.16.6', notes: 'Win-song embed now fires immediately when the win screen renders, before fireworks/other setup, so it\u2019s as close to your click as possible. Confirmed against Chrome\u2019s own autoplay docs that our permission setup is correct \u2014 remaining flakiness looks like it sits in Spotify\u2019s own embed, which has known community-reported autoplay bugs on their end.' },
    { v: '2.16.5', notes: 'Reverted to the plain embed method for good \u2014 this is what actually gave varied songs AND varied starting points. The controller API\u2019s seek() turned out to be podcast-only per Spotify\u2019s own docs, so it could never replicate that. If autoplay doesn\u2019t fire, tap the \u25b6 Play button, and check your phone isn\u2019t on silent/mute \u2014 iOS blocks web audio when it is, regardless of code.' },
    { v: '2.16.4', notes: 'Seek attempt now triggers on Spotify\u2019s "ready"/"playback_started" events too, not just timers. Heads up: Spotify\u2019s own docs describe seek() as being for podcast episodes specifically \u2014 if this still doesn\u2019t work, it may not be supported for music tracks at all, regardless of timing.' },
    { v: '2.16.3', notes: 'Fixed the skip-ahead not actually applying \u2014 the seek was firing before the player had loaded the track. Now waits for confirmed playback (with fallback timers) before seeking, and bumped the skip to 60 seconds in.' },
    { v: '2.16.2', notes: 'Restored reliable autoplay using Spotify\u2019s official iFrame API (plain embeds were failing to autoplay entirely). Now skips ahead ~25 seconds after starting so it isn\u2019t dead silent at 0:00 \u2014 not true hook-detection, just a fixed skip, but should feel closer to before.' },
    { v: '2.16.1', notes: 'Reverted song/snippet playback to the plain embed method \u2014 restores Spotify\u2019s default "hook" starting position instead of always starting at 0:00, for both the 10s snippets and 60s win songs.' },
    { v: '2.16.0', notes: 'Removed the Play/History/Stats tab bar. Play is now the main view by default. History and Stats moved to top-right pill buttons next to Players, each opening as their own panel.' },
    { v: '2.15.2', notes: 'Gave the whole app content area a solid card backing so setup screens, gameplay, and stats stand out clearly from the moving background instead of floating loosely over it.' },
    { v: '2.15.1', notes: 'The psychedelic background now shows on every screen and tab, not just the main menu.' },
    { v: '2.15.0', notes: 'Added player profile pictures: upload, change, or remove from either the Players panel or a game\u2019s setup screen. Their photo shows next to their name whenever it\u2019s their turn to throw, in every game type.' },
    { v: '2.14.3', notes: 'Fixed click sounds not playing on mobile Safari \u2014 sound now waits for the audio engine to actually be running before firing, instead of sometimes racing ahead of it.' },
    { v: '2.14.2', notes: 'Fixed the logo being covered by the Main menu/Players buttons on mobile \u2014 page content now starts low enough to clear them.' },
    { v: '2.14.1', notes: 'Fixed: clicking the \u2699 edit icon on a saved-player chip a second time now closes the edit panel instead of just reopening it.' },
    { v: '2.14.0', notes: 'Editing a player from the Players panel no longer drops you into a game setup screen \u2014 it edits right there in the panel. Editing from inside a game\u2019s setup screen still works the same as before. Either way, changes apply everywhere since profiles are shared across all games.' },
    { v: '2.13.0', notes: 'Players button is now a bigger labeled pill instead of a tiny icon. Added a persistent Main menu button (top-left, next to Settings) so you can switch games anytime, from any tab.' },
    { v: '2.12.0', notes: 'Added a Players button (top-right, and next to Main menu on the win screen) showing every saved player with their stats at a glance and a one-tap Edit into their profile.' },
    { v: '2.11.0', notes: 'Added a Main menu button on the win screen (no refresh needed). Clearing stats in the Stats/History tabs no longer deletes the player from saved players. Also fixed the win screen always saying "Checked out from 200" regardless of the game played.' },
    { v: '2.10.0', notes: 'Added a search button next to each artist/song field that opens Spotify search in a new tab, so you can grab the link and paste it back in faster.' },
    { v: '2.9.0', notes: 'Artist link mode now supports up to 5 artists per player, randomly picking one (and their top track) each time instead of always the same artist.' },
    { v: '2.8.0', notes: 'Player song setup now has a toggle: paste 5 individual track links, or just one artist link to play their top track instead (quicker to set up).' },
    { v: '2.7.0', notes: 'Added UI click sounds (Ping, Doing, Splat, Mush, Acid) synthesized in-browser, selectable in settings. Off by default.' },
    { v: '2.6.0', notes: 'Gave the CK Darts logo a bold display font with a slow color-shifting gradient, and switched the rest of the app to a friendlier body font (Poppins).' },
    { v: '2.5.1', notes: 'The psychedelic background now covers the entire screen while choosing a game, with the game picker as a solid standout card on top.' },
    { v: '2.5.0', notes: 'Added a live animated psychedelic background (hue-shifting blurred blobs) to the game selection screen.' },
    { v: '2.4.0', notes: 'Added Export/Import in settings so saved players, songs, history, and theme can carry over to a newly downloaded copy of the file.' },
    { v: '2.3.0', notes: 'Leaderboards now show rank numbers, with a gold/silver/bronze crown next to 1st, 2nd, and 3rd place.' },
    { v: '2.2.0', notes: 'History tab: delete any single game, not just a whole player. Settings panel: added 8 preset colorways alongside the custom picker.' },
    { v: '2.1.0', notes: 'Added a settings button (top-left gear icon) to customize the background, card/trim, and accent colors. Saved to your device.' },
    { v: '2.0.0', notes: 'Added a game picker: 200, 501, 301, 170, Around the Clock, and Cricket. Only 200 plays the 50+ snippet and mid-game music; the rest just play a win song.' },
    { v: '1.8.1', notes: 'Added a way to delete a player from the Stats and History tabs, not just the Play tab.' },
    { v: '1.8.0', notes: 'Switched to Spotify\u2019s official iFrame API for more reliable playback, added a manual play fallback, and added 10-second snippets for any throw over 50.' },
    { v: '1.7.0', notes: 'Players can save up to 5 Spotify songs; a random one plays for 60 seconds when they win.' },
    { v: '1.6.0', notes: 'Highest throw now shows a crown and the player\u2019s name; added edit/delete for saved players; fireworks on the win screen.' },
    { v: '1.5.1', notes: 'Renamed the app to CK Darts.' },
    { v: '1.5.0', notes: 'Choose who goes first; winner starts automatically on "Play again"; version tracking added.' },
    { v: '1.4.0', notes: 'Saved players now show as tap-to-add chips during setup.' },
    { v: '1.3.0', notes: 'Per-player breakdown of busts, avg busts, highest throw, and avg highest throw.' },
    { v: '1.2.0', notes: 'Added overview stats: total busts, avg busts per game, highest throw, avg highest per game.' },
    { v: '1.1.0', notes: 'Added Play, History, and Stats tabs; saved player roster; 2v2 teams mode.' },
    { v: '1.0.0', notes: 'Initial release: countdown scorer for 2-8 players from a starting score of 200.' }
  ];

  function loadTheme(){
    try {
      var saved = JSON.parse(localStorage.getItem(THEME_KEY)) || {};
      return {
        bg: saved.bg || DEFAULT_THEME.bg,
        card: saved.card || DEFAULT_THEME.card,
        accent: saved.accent || DEFAULT_THEME.accent,
        buttonGlow: saved.buttonGlow || DEFAULT_THEME.buttonGlow,
        boxGlow: saved.boxGlow || DEFAULT_THEME.boxGlow
      };
    } catch(e){
      return { bg: DEFAULT_THEME.bg, card: DEFAULT_THEME.card, accent: DEFAULT_THEME.accent, buttonGlow: DEFAULT_THEME.buttonGlow, boxGlow: DEFAULT_THEME.boxGlow };
    }
  }
  function saveTheme(t){
    try { localStorage.setItem(THEME_KEY, JSON.stringify(t)); } catch(e){}
  }
  function applyTheme(t){
    document.documentElement.style.setProperty('--bg', t.bg);
    document.documentElement.style.setProperty('--card', t.card);
    document.documentElement.style.setProperty('--border-accent', t.accent);
    document.documentElement.style.setProperty('--button-glow-color', t.buttonGlow || t.accent);
    document.documentElement.style.setProperty('--box-glow-color', t.boxGlow || t.accent);
  }
  function initTheme(){
    applyTheme(loadTheme());
  }

  function initSettingsButton(){
    document.getElementById('settings-btn').addEventListener('click', openSettingsModal);
  }

  function openSettingsModal(){
    state.settingsOpen = true;
    render();
  }

  function closeSettingsModal(){
    state.settingsOpen = false;
    render();
  }

  function renderSettingsModal(){
    var root = document.getElementById('settings-modal-root');
    if (!root) return;
    if (!state.settingsOpen) {
      root.innerHTML = '';
      return;
    }
    root.innerHTML =
      '<div class="modal-overlay" id="settings-modal-overlay">' +
        '<div class="modal-panel settings-modal-panel" id="settings-modal-panel">' +
          '<button type="button" class="modal-close-btn" id="settings-modal-close" aria-label="Close settings">&#10005;</button>' +
          '<div id="settings-modal-content"></div>' +
        '</div>' +
      '</div>';
    renderSettingsTab('settings-modal-content');
    document.getElementById('settings-modal-close').addEventListener('click', closeSettingsModal);
    document.getElementById('settings-modal-overlay').addEventListener('click', function(e){
      if (e.target.id === 'settings-modal-overlay') closeSettingsModal();
    });
  }

  function renderSettingsTab(containerId){
    var panel = document.getElementById(containerId);
    var theme = loadTheme();

    panel.innerHTML =
      '<div class="settings-panel">' +
      '<p class="settings-section-heading" style="margin-top:0;">Appearance</p>' +
      '<p class="label" style="margin-top:0;">Presets</p>' +
      '<div class="theme-swatch-grid" id="theme-swatch-grid"></div>' +
      '<p class="label">Custom</p>' +
      '<div class="settings-color-grid">' +
        '<label>Trim &middot; cards and borders<input type="color" id="theme-card" /></label>' +
        '<label>Accent color<input type="color" id="theme-accent" /></label>' +
        '<label>Button glow color<input type="color" id="theme-button-glow" /></label>' +
        '<label>Box glow color<input type="color" id="theme-box-glow" /></label>' +
      '</div>' +
      '<button type="button" id="theme-reset" style="width:100%; margin-top:6px;">Reset appearance</button>' +
      '<p class="settings-section-heading">Sound FX</p>' +
      '<p class="label" style="margin-top:0;">Click sounds</p>' +
      '<div class="sound-row" id="sound-row"></div>' +
      '<label style="margin-top:10px;">Sound FX Volume<input type="range" id="sound-volume-slider" min="0" max="100" style="width:100%; margin-top:4px;" /></label>' +
      '<p class="settings-section-heading">Music</p>' +
      '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">' +
        '<span class="label" style="margin:0;">Play win songs &amp; 50+ snippets</span>' +
        '<button type="button" id="music-enabled-toggle" class="sound-btn"></button>' +
      '</div>' +
      '<label>Music Volume<input type="range" id="music-volume-slider" min="0" max="100" style="width:100%; margin-top:4px;" /></label>' +
      '<p class="settings-section-heading">Backup &amp; restore</p>' +
      '<p style="font-size:11px; color:var(--text-muted); margin:0 0 8px;">Export before downloading a new version of this file, then import it back &mdash; browsers don\'t share saved data between file downloads.</p>' +
      '<div style="display:flex; gap:8px;">' +
        '<button type="button" id="export-data-btn" style="flex:1;">Export</button>' +
        '<button type="button" id="import-data-btn" style="flex:1;">Import</button>' +
      '</div>' +
      '<input type="file" id="import-file-input" accept="application/json" style="display:none;" />' +
      '</div>';

    var cardInput = document.getElementById('theme-card');
    var accentInput = document.getElementById('theme-accent');
    var buttonGlowInput = document.getElementById('theme-button-glow');
    var boxGlowInput = document.getElementById('theme-box-glow');
    cardInput.value = theme.card;
    accentInput.value = theme.accent;
    buttonGlowInput.value = theme.buttonGlow;
    boxGlowInput.value = theme.boxGlow;

    var swatchGrid = document.getElementById('theme-swatch-grid');
    swatchGrid.innerHTML = PRESET_THEMES.map(function(p, i){
      return '<button type="button" class="theme-swatch" data-i="' + i + '">' +
        '<span class="swatch-dot" style="background:' + p.accent + ';"></span>' +
        '<span class="swatch-label">' + p.name + '</span>' +
      '</button>';
    }).join('');
    swatchGrid.querySelectorAll('.theme-swatch').forEach(function(b){
      b.addEventListener('click', function(){
        var preset = PRESET_THEMES[parseInt(b.dataset.i, 10)];
        var t = { bg: preset.bg, card: preset.card, accent: preset.accent, buttonGlow: preset.accent, boxGlow: preset.accent };
        cardInput.value = t.card;
        accentInput.value = t.accent;
        buttonGlowInput.value = t.buttonGlow;
        boxGlowInput.value = t.boxGlow;
        applyTheme(t);
        saveTheme(t);
      });
    });

      if (data.theme) saveTheme(data.theme);
      if (data.library) saveLibrary(data.library);
      window.location.reload();
    };
    reader.readAsText(file);
  }

  function addToRoster(names){
    var roster = loadRoster();
    names.forEach(function(n){
      n = (n || '').trim();
      if (!n) return;
      var exists = roster.some(function(r){ return r.toLowerCase() === n.toLowerCase(); });

  function renameRosterPlayer(oldName, newName){
    newName = (newName || '').trim();
    if (!newName) return;
    var lowerOld = oldName.toLowerCase();

    var roster = loadRoster();
    var idx = roster.findIndex(function(r){ return r.toLowerCase() === lowerOld; });
    if (idx !== -1) roster[idx] = newName;
    saveRoster(roster);

    var hist = loadHistory();
    hist.forEach(function(g){
      if (g.mode === 'ffa') {
        g.participants = g.participants.map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; });
        if (g.winner && g.winner.toLowerCase() === lowerOld) g.winner = newName;
      } else {
        g.participants = g.participants.map(function(team){
          return team.map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; });
        });
        if (g.winnerMembers) {
          g.winnerMembers = g.winnerMembers.map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; });
          g.winner = g.winnerMembers.join(' & ');
        }
      }
      (g.throws || []).forEach(function(entry){
        if (g.mode === 'ffa' && entry.who && entry.who.toLowerCase() === lowerOld) {
          entry.who = newName;
        } else if (g.mode === 'teams' && entry.who) {
          entry.who = entry.who.split(' & ').map(function(n){ return n.toLowerCase() === lowerOld ? newName : n; }).join(' & ');
        }
        (entry.log || []).forEach(function(t){
          if (t.thrower && t.thrower.toLowerCase() === lowerOld) t.thrower = newName;
        });
      });
    });
    saveHistory(hist);

    var profiles = loadProfiles();
    if (profiles[lowerOld]) {
      profiles[newName.toLowerCase()] = profiles[lowerOld];
      delete profiles[lowerOld];
      saveProfiles(profiles);
    }

    state.names = state.names.map(function(n){ return (n || '').toLowerCase() === lowerOld ? newName : n; });
    state.teamNames = state.teamNames.map(function(n){ return (n || '').toLowerCase() === lowerOld ? newName : n; });
  }

  function resizeImageToDataUrl(file, maxDim, callback){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        var scale = Math.min(1, maxDim / Math.max(w, h));
        var cw = Math.max(1, Math.round(w * scale));
        var ch = Math.max(1, Math.round(h * scale));
        var canvas = document.createElement('canvas');
        canvas.width = cw;
        canvas.height = ch;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, cw, ch);
        try {
          callback(canvas.toDataURL('image/jpeg', 0.82));
        } catch(err){
          callback(null);
        }
      };
      img.onerror = function(){ callback(null); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ callback(null); };
    reader.readAsDataURL(file);
  }

    zone.addEventListener('dragleave', function(){

    zone.addEventListener('drop', function(e){
      e.preventDefault();
      zone.classList.remove('drag-over');
      var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file && file.type.indexOf('image/') === 0) onFile(file);
    });
  }

      .then(function(buf){ return ctx.decodeAudioData(buf); })

  function playLibraryTrackFallback(containerId, track, durationMs, target, priorErrMsg, myGen){
    if (playGeneration[containerId] !== myGen) return;
    var audio = getPersistentAudio(containerId);
    try { audio.pause(); } catch(e){}
    audio.onended = null;
    audio.onerror = null;
    audio.src = track.url;
    audio.load();
    audio.volume = loadMusicVolume();
    window.__ckdAudio[containerId] = audio;
    function reportFailure(reason){
      if (target && playGeneration[containerId] === myGen) {
        var combined = (priorErrMsg ? ('WebAudio: ' + priorErrMsg + ' \u00b7 ') : '') + 'Fallback: ' + reason;
        showAudioDiagnostic(target, combined);
      }
    }
    audio.onerror = function(){
      var code = audio.error ? audio.error.code : 'unknown';
      reportFailure('media error ' + code);
    };
    var playAttempt = audio.play();
    if (playAttempt && playAttempt.catch) {
      playAttempt.catch(function(err){ reportFailure((err && err.name) || String(err)); });
    }
    if (durationMs) {
      setTimeout(function(){ if (playGeneration[containerId] === myGen) stopAudio(containerId); }, durationMs);
    }
    audio.onended = function(){
      if (window.__ckdAudio[containerId] === audio) window.__ckdAudio[containerId] = null;
    };
  }

  function playLibraryTrack(containerId, track, durationMs, showLabel){
    var target = document.getElementById(containerId);
    if (!target || !track) return;
    stopAudio(containerId);
    var myGen = bumpGeneration(containerId);
    if (showLabel !== false) {
      target.innerHTML = '<p class="label" style="margin:0;">' + track.title + '</p>';
    } else {
      target.innerHTML = '';
    }
    refreshTrackPreviewUrl(track).catch(function(){}).then(function(){
      if (playGeneration[containerId] !== myGen) return;
      var ctx = getAudioCtx();
      if (ctx) {
        loadAudioBuffer(ctx, track.url).then(function(buffer){
          if (playGeneration[containerId] !== myGen) return;
          var src = ctx.createBufferSource();
          src.buffer = buffer;
          var gain = getMusicGain(ctx);
          gain.gain.value = loadMusicVolume();
          src.connect(gain);
          src.start(0);
          activeBufferSources[containerId] = src;
          src.onended = function(){
            if (activeBufferSources[containerId] === src) activeBufferSources[containerId] = null;
          };
          if (durationMs) {
            setTimeout(function(){ if (playGeneration[containerId] === myGen) stopBufferSource(containerId); }, durationMs);
          }
        }).catch(function(err){
          if (playGeneration[containerId] !== myGen) return;
          var msg = (err && (err.message || err.name)) || String(err);
          playLibraryTrackFallback(containerId, track, durationMs, target, msg, myGen);
        });
      } else {
        playLibraryTrackFallback(containerId, track, durationMs, target, 'no audio context', myGen);
      }
    });
  }

    var value = CRICKET_VALUES[key];

    var thrower = state.mode === 'ffa' ? entity.name : entity.members[state.turnMember[state.turnIndex]];
    var scored = false;

      if (openElsewhere) {
        entity.points += value;
        scored = true;

    }
    entity.marks[key] = current + 1;
    entity.history.push({ key: key, scored: scored, thrower: thrower });
    state.cricketDartsThisTurn += 1;
    vibrate(10);

    if (cricketAllClosed(entity)) {
      var maxOther = others.reduce(function(m, o){ return Math.max(m, o.points); }, 0);
      if (entity.points >= maxOther) {

    var turnSum = state.turnDarts.reduce(function(a, b){ return a + b; }, 0);

      state.turnDarts = [];

    if (state.turnDarts.length >= 3) {

  var DARTBOARD_ORDER = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

  function polarToXY(cx, cy, r, angleDeg){
    var rad = angleDeg * Math.PI / 180;
    return { x: cx + r * Math.sin(rad), y: cy - r * Math.cos(rad) };
  }

  function wedgePathD(cx, cy, rInner, rOuter, startDeg, endDeg){
    var p1 = polarToXY(cx, cy, rInner, startDeg);
    var p2 = polarToXY(cx, cy, rOuter, startDeg);
    var p3 = polarToXY(cx, cy, rOuter, endDeg);
    var p4 = polarToXY(cx, cy, rInner, endDeg);
    return 'M ' + p1.x.toFixed(2) + ' ' + p1.y.toFixed(2) +
      ' L ' + p2.x.toFixed(2) + ' ' + p2.y.toFixed(2) +
      ' A ' + rOuter + ' ' + rOuter + ' 0 0 1 ' + p3.x.toFixed(2) + ' ' + p3.y.toFixed(2) +
      ' L ' + p4.x.toFixed(2) + ' ' + p4.y.toFixed(2) +
      ' A ' + rInner + ' ' + rInner + ' 0 0 0 ' + p1.x.toFixed(2) + ' ' + p1.y.toFixed(2) +
      ' Z';
  }

  function dartboardSvgHtml(target){
    var cx = 150, cy = 150, rOuter = 145, rInner = 42;
    var parts = DARTBOARD_ORDER.map(function(num, i){
      var startDeg = i * 18 - 9;
      var endDeg = i * 18 + 9;
      var d = wedgePathD(cx, cy, rInner, rOuter, startDeg, endDeg);
      var isDone = num < target;
      var isTarget = num === target;
      var cls = 'atc-wedge' + (i % 2 === 0 ? ' alt' : '') + (isTarget ? ' target' : '') + (isDone ? ' done' : '');
      var labelCls = 'atc-wedge-label' + (isTarget ? ' on-target' : '') + (isDone ? ' done' : '');
      var labelPos = polarToXY(cx, cy, rOuter - 20, i * 18);
      return '<path class="' + cls + '" d="' + d + '" data-num="' + num + '"></path>' +
        '<text class="' + labelCls + '" x="' + labelPos.x.toFixed(1) + '" y="' + labelPos.y.toFixed(1) + '" text-anchor="middle" dominant-baseline="central">' + num + '</text>';
    }).join('');
    var bullDone = target > 21;
    var bullTarget = target === 21;
    var bullCls = 'atc-wedge atc-bullseye' + (bullTarget ? ' target' : '') + (bullDone ? ' done' : '');
    var bullLabelCls = 'atc-wedge-label' + (bullTarget ? ' on-target' : '') + (bullDone ? ' done' : '');
    parts += '<circle class="' + bullCls + '" cx="' + cx + '" cy="' + cy + '" r="' + rInner + '" data-num="21"></circle>' +
      '<text class="' + bullLabelCls + '" x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="central">Bull</text>';
    return '<div class="atc-dartboard-wrap"><svg class="atc-dartboard" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">' + parts + '</svg></div>';
  }

  function launchFireworks(canvas){
    var ctx = canvas.getContext('2d');
    var w = canvas.width = canvas.clientWidth;
    var h = canvas.height = canvas.clientHeight;
    var colors = ['#5b8cff', '#e08a4f', '#4fce8a', '#e05a5a', '#f0c94f', '#c56be0'];
    var particles = [];

    function spawnBurst(){
      var cx = w * (0.2 + Math.random() * 0.6);
      var cy = h * (0.15 + Math.random() * 0.4);
      var color = colors[Math.floor(Math.random() * colors.length)];
      var count = 26;
      for (var i = 0; i < count; i++) {
        var angle = (Math.PI * 2 * i) / count;
        var speed = 1.6 + Math.random() * 2.2;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          color: color
        });
      }
    }

    var bursts = 0;
    var maxBursts = 5;
    spawnBurst();
    bursts++;
    var burstTimer = setInterval(function(){
      spawnBurst();
      bursts++;
      if (bursts >= maxBursts) clearInterval(burstTimer);
    }, 450);

    var stopped = false;
    function tick(){
      if (stopped) return;
      ctx.clearRect(0, 0, w, h);
      particles.forEach(function(p){
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.035;
        p.alpha -= 0.012;
      });
      particles = particles.filter(function(p){ return p.alpha > 0; });
      particles.forEach(function(p){
        ctx.globalAlpha = Math.max(p.alpha, 0);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      if (bursts < maxBursts || particles.length > 0) {
        requestAnimationFrame(tick);
      } else {
        ctx.clearRect(0, 0, w, h);
      }
    }
    tick();
  }
